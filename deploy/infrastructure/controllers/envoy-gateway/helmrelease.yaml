apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: envoy-gateway-system
  chart:
    spec:
      chart: gateway-helm
      version: "v1.6.4"
      sourceRef:
        kind: HelmRepository
        name: envoyproxy
        namespace: flux-system
      interval: 12h
  # Merge three upstream value files that configure:
  #   1. AI Gateway extension manager hooks (AIGatewayRoute, token cost tracking)
  #   2. Rate-limit addon (Redis backend for Limitador)
  #   3. InferencePool backend resource support
  valuesFrom:
    - kind: ConfigMap
      name: envoy-gateway-aigw-values
      optional: true
  values:
    # Extension manager: points at the AI Gateway controller for xDS hooks
    extensionManager:
      hooks:
        xdsTranslator:
          pre:
            - Listener
            - VirtualHost
            - HTTPRoute
            - Translation
      service:
        host: ai-gateway-controller.envoy-ai-gateway-system.svc.cluster.local
        port: 1063
        tls:
          certFile: /certs/tls.crt
          keyFile: /certs/tls.key
    # InferencePool backend resource support (inference.networking.k8s.io/v1)
    provider:
      kubernetes:
        watch:
          namespaces: []  # watch all namespaces
    # Rate-limit global config — Redis in redis-system
    rateLimit:
      backend:
        type: Redis
        redis:
          url: redis.redis-system.svc.cluster.local:6379

---
# NVIDIA DRA (Dynamic Resource Allocation) Driver
# Note: This is currently experimental and requires DRA-enabled Kubernetes
apiVersion: v1
kind: Namespace
metadata:
  name: nvidia-dra-driver
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nvidia-dra-driver
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: nvidia-dra-driver
      version: "0.2.x"
      sourceRef:
        kind: HelmRepository
        name: nvidia
        namespace: flux-system
      interval: 5m
  targetNamespace: nvidia-dra-driver
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  dependsOn:
    - name: gpu-operator
      namespace: flux-system
  values:
    image:
      pullPolicy: IfNotPresent
    kubeletPlugin:
      nodeSelector:
        nvidia.com/dra-kubelet-plugin: "true"

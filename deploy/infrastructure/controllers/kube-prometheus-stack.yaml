---
apiVersion: v1
kind: Namespace
metadata:
  name: kube-prometheus-stack
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "67.x.x"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 5m
  targetNamespace: kube-prometheus-stack
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    prometheus:
      prometheusSpec:
        replicas: 1
        retention: 30d
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 50Gi
        # Scrape DCGM GPU metrics from NVIDIA GPU Operator
        additionalScrapeConfigs:
          - job_name: 'dcgm-exporter'
            kubernetes_sd_configs:
              - role: endpoints
                namespaces:
                  names:
                    - gpu-operator
            relabel_configs:
              - source_labels: [__meta_kubernetes_service_name]
                action: keep
                regex: nvidia-dcgm-exporter
          # Scrape Limitador token-usage metrics
          - job_name: 'limitador'
            kubernetes_sd_configs:
              - role: endpoints
                namespaces:
                  names:
                    - kuadrant-system
            relabel_configs:
              - source_labels: [__meta_kubernetes_service_name]
                action: keep
                regex: limitador
    grafana:
      enabled: true
      adminPassword: admin  # Change in production!
      persistence:
        enabled: true
        storageClassName: longhorn
        size: 10Gi
      datasources:
        datasources.yaml:
          apiVersion: 1
          datasources:
            - name: Prometheus
              type: prometheus
              url: http://kube-prometheus-stack-prometheus:9090
              access: proxy
              isDefault: true
    alertmanager:
      enabled: true
      alertmanagerSpec:
        replicas: 1
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi
  dependsOn:
    - name: longhorn
      namespace: flux-system
    - name: gpu-operator
      namespace: flux-system

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # CRDs must be installed first
  - gateway-api-crds.yaml
  # Storage
  - longhorn.yaml
  # GPU support
  - gpu-operator.yaml
  - nvidia-dra-driver.yaml
  # Gateway and networking
  - envoy-gateway.yaml
  # Auth and rate limiting
  - kuadrant.yaml
  # Observability
  - kube-prometheus-stack.yaml

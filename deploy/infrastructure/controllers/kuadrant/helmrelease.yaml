apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kuadrant-operator
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: kuadrant-system
  # Kuadrant's AuthPolicy attaches to Envoy Gateway; EG must be ready first.
  dependsOn:
    - name: envoy-gateway
    - name: envoy-ai-gateway
  chart:
    spec:
      chart: kuadrant-operator
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: kuadrant
        namespace: flux-system
      interval: 12h
---
# Kuadrant CR — tells the operator to spin up Authorino and Limitador.
apiVersion: kuadrant.io/v1beta1
kind: Kuadrant
metadata:
  name: kuadrant
  namespace: kuadrant-system

---
# Gateway API CRDs - Applied via Kustomization from GitRepository
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateway-api-crds
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: gateway-api
    namespace: flux-system
  path: ./config/crd/standard
  prune: true
  wait: true
---
# Gateway API Inference Extension CRDs
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateway-api-inference-extension-crds
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: gateway-api-inference-extension
    namespace: flux-system
  path: ./config/crd
  prune: true
  wait: true
  dependsOn:
    - name: gateway-api-crds
---
# Envoy AI Gateway CRDs
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-ai-gateway-crds
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: envoy-ai-gateway
    namespace: flux-system
  path: ./deploy/crd
  prune: true
  wait: true
  dependsOn:
    - name: gateway-api-crds

---
apiVersion: v1
kind: Namespace
metadata:
  name: gpu-operator
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gpu-operator
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: gpu-operator
      version: "v24.9.x"
      sourceRef:
        kind: HelmRepository
        name: nvidia
        namespace: flux-system
      interval: 5m
  targetNamespace: gpu-operator
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    operator:
      defaultRuntime: containerd
    driver:
      enabled: false  # Assume driver already installed on host
    toolkit:
      enabled: true
    devicePlugin:
      enabled: true
      config:
        name: time-slicing-config
        default: any
    dcgm:
      enabled: true
    dcgmExporter:
      enabled: true
      serviceMonitor:
        enabled: true
    migManager:
      enabled: true
    nodeStatusExporter:
      enabled: true
    gfd:
      enabled: true

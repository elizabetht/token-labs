# NOTE: The NVIDIA DRA Driver is currently BLOCKED on DGX Spark GB10 GPUs.
# The GB10 uses unified CPU+GPU memory, and the DRA driver v25.12.0 returns:
#   "error getting memory info for device 0: Not Supported"
#
# Prerequisites before enabling:
#   - Kubernetes >= 1.34.2  (DRA stable gate)
#   - GPU Operator >= 25.10.0
#   - NVIDIA Driver >= 580
#
# Until the above are met, keep this HelmRelease suspended.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nvidia-dra-driver
  namespace: flux-system
spec:
  suspend: true   # ← flip to false once GB10 support lands
  interval: 1h
  targetNamespace: gpu-operator
  chart:
    spec:
      chart: nvidia-dra-driver-kubernetes
      version: "v25.*"
      sourceRef:
        kind: HelmRepository
        name: nvidia-gpu-operator
        namespace: flux-system
      interval: 12h
  dependsOn:
    - name: nvidia-gpu-operator
  valuesFrom:
    - kind: ConfigMap
      name: nvidia-dra-driver-values
      valuesKey: values.yaml
      optional: true
  values:
    image:
      pullPolicy: IfNotPresent
    kubeletPlugin:
      nodeSelector:
        nvidia.com/dra-kubelet-plugin: "true"

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: longhorn-system
  chart:
    spec:
      chart: longhorn
      version: "1.7.*"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
      interval: 12h
  values:
    defaultSettings:
      # Store exactly one replica per PV — DGX Spark nodes each have local NVMe.
      # Set to 2 if you add a third node.
      defaultReplicaCount: 1
      # Model weights are large; aggressive orphan cleanup keeps disks tidy.
      orphanAutoDeletion: true
    persistence:
      defaultClass: true
      defaultClassReplicaCount: 1

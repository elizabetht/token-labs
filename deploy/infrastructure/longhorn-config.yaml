# Flux Kustomization for Longhorn StorageClass customizations.
# The longhorn-model-cache StorageClass (1 replica, Retain policy) is used
# by all model-cache PVCs. Applied after Longhorn HelmRelease is ready.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: longhorn-config
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  path: ./deploy/infrastructure/longhorn
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system

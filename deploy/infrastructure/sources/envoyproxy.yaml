# Envoy Gateway and Envoy AI Gateway are distributed as OCI Helm charts on Docker Hub.
# Flux supports OCI HelmRepositories since Flux v2.1 (type: oci).
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: envoyproxy
  namespace: flux-system
spec:
  interval: 12h
  type: oci
  url: oci://docker.io/envoyproxy

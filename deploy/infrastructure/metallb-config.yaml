# Flux Kustomization for MetalLB IP address pool and L2 advertisement.
# This is a separate Kustomization from the MetalLB HelmRelease because
# IPAddressPool and L2Advertisement are MetalLB CRDs that don't exist until
# the HelmRelease installs MetalLB. Flux retries until the CRDs are available.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metallb-config
  namespace: flux-system
spec:
  interval: 5m
  retryInterval: 1m
  path: ./deploy/infrastructure/metallb
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system

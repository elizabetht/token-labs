# One-time Job: pre-serialize Nemotron VL 12B FP8 weights with Tensorizer.
# Run once after the model has been downloaded into the model-cache-nemotron-vl-12b PVC.
# Usage: kubectl apply -f deploy/llm-d/jobs/serialize-nemotron-vl-12b.yaml -n token-labs
apiVersion: batch/v1
kind: Job
metadata:
  name: serialize-nemotron-vl-12b
  namespace: token-labs
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: spark-02
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      runtimeClassName: nvidia
      containers:
      - name: serialize
        image: ghcr.io/elizabetht/token-labs/vllm-serve:v0.4.0
        command: ["python3", "-c"]
        args:
        - |
          from tensorizer import TensorSerializer
          from vllm import LLM
          llm = LLM(model="nvidia/NVIDIA-Nemotron-Nano-12B-v2-VL-FP8",
                     quantization="modelopt", dtype="auto",
                     trust_remote_code=True, enforce_eager=True,
                     gpu_memory_utilization=0.90,
                     download_dir="/model-cache/huggingface")
          serializer = TensorSerializer("/model-cache/nemotron-vl-12b.tensors")
          serializer.write_module(llm.llm_engine.model_executor.driver_worker.model_runner.model)
          serializer.close()
          print("Done")
        env:
        - name: HF_HOME
          value: /model-cache/huggingface
        - name: CUDA_MODULE_LOADING
          value: "LAZY"
        resources:
          limits:
            nvidia.com/gpu: "1"
            memory: 64Gi
        volumeMounts:
        - name: model-cache
          mountPath: /model-cache
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache-nemotron-vl-12b
      restartPolicy: Never
  backoffLimit: 1

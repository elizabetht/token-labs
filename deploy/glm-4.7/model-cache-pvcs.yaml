# PVCs for GLM-4.7-NVFP4 model cache — one per node
#
# PP=2 requires each node to hold the full checkpoint on disk.
# Selective NVFP4 weights: ~206 GB + HF hub temp files during download → 300 GB per node.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache-glm-4-7-spark-01
  namespace: token-labs
  annotations:
    volume.kubernetes.io/selected-node: spark-01
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn-model-cache
  resources:
    requests:
      storage: 300Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache-glm-4-7-spark-02
  namespace: token-labs
  annotations:
    volume.kubernetes.io/selected-node: spark-02
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn-model-cache
  resources:
    requests:
      storage: 300Gi

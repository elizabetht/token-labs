# PVCs for gpt-oss-120gb model cache — one per node
#
# PP=2 requires the full model weights on each node's disk.
# vLLM downloads the full checkpoint, then loads only its pipeline stage
# into GPU memory (~60 GB per stage out of 128 GB unified memory).
---
# --- spark-01: gpt-oss-120gb cache (leader) ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache-gpt-oss-spark-01
  namespace: token-labs
  annotations:
    volume.kubernetes.io/selected-node: spark-01
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn-model-cache
  resources:
    requests:
      storage: 150Gi   # 120 GB BF16 weights + HF hub temp files during download
---
# --- spark-02: gpt-oss-120gb cache (worker) ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache-gpt-oss-spark-02
  namespace: token-labs
  annotations:
    volume.kubernetes.io/selected-node: spark-02
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn-model-cache
  resources:
    requests:
      storage: 150Gi   # 120 GB BF16 weights + HF hub temp files during download

# InferencePool + EPP values — Qwen/Qwen3-Coder-Next (PP=2, LeaderWorkerSet)
#
# matchLabels select only the LEADER pod (which serves the SGLang API).
# The worker pod participates via NCCL but is not directly routable.

inferencePool:
  modelServers:
    matchLabels:
      llm-d.ai/inference-serving: "true"
      llm-d.ai/model: qwen3-coder-next
  modelServerType: sglang

inferenceExtension:
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi
  # EPP image is amd64-only; pin to controller node (DGX Spark nodes are arm64)
  tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: kubernetes.io/arch
            operator: In
            values:
            - amd64
  monitoring:
    interval: "10s"
    secret:
      name: inference-scheduling-gateway-sa-metrics-reader-secret
    prometheus:
      enabled: true
      auth:
        enabled: true

provider:
  name: none

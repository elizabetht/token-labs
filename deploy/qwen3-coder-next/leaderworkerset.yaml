# LeaderWorkerSet — Qwen/Qwen3-Coder-Next with PP=2 across 2 DGX Sparks
#
# Architecture:
#   spark-01 (leader): SGLang HTTP server, PP rank 0, layers 0–N/2
#   spark-02 (worker): SGLang PP rank 1, layers N/2–N
#   Communication: NCCL over ethernet (pod overlay, backed by 100 GbE)
#   Distributed init: torch.distributed via --dist-init-addr leader_ip:20000
#
# Model: Qwen/Qwen3-Coder-Next
#   - Large coder model with thinking/reasoning support
#   - PP=2: each rank loads ~half the weights into 125 GB GPU DRAM
#   - Tool-call and reasoning parsers enabled (qwen25/qwen3)
#   - 128K context length optimized for long-context code tasks
#
# Prerequisites:
#   1. Install LWS controller:
#      kubectl apply --server-side -f https://github.com/kubernetes-sigs/lws/releases/latest/download/manifests.yaml
#   2. Disable GPU time-slicing on both nodes:
#      kubectl label node spark-01 nvidia.com/gpu.sharing-strategy=none --overwrite
#      kubectl label node spark-02 nvidia.com/gpu.sharing-strategy=none --overwrite
#   3. Create PVCs:
#      kubectl apply -f deploy/qwen3-coder-next/model-cache-pvcs.yaml
#   4. Create HF token secret if model requires auth:
#      kubectl create secret generic hf-token-secret --from-literal=hf-token=hf_xxx -n token-labs

apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: qwen3-coder-next
  namespace: token-labs
  labels:
    app: qwen3-coder-next
spec:
  replicas: 1
  leaderWorkerTemplate:
    size: 2                                    # 1 leader + 1 worker
    restartPolicy: RecreateGroupOnPodRestart
    leaderTemplate:
      metadata:
        labels:
          app: qwen3-coder-next
          role: leader
          llm-d.ai/inference-serving: "true"
          llm-d.ai/model: qwen3-coder-next
      spec:
        runtimeClassName: nvidia
        nodeSelector:
          kubernetes.io/hostname: spark-01
        tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        containers:
        - name: sglang
          image: lmsysorg/sglang:nightly-dev-cu13-20260318-cb1e63ab
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          ports:
          - containerPort: 8000
            name: http
          - containerPort: 20000
            name: dist-init
          resources:
            requests:
              cpu: "8"
              memory: 64Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "12"
              memory: 250Gi
              nvidia.com/gpu: "1"
          env:
          - name: HF_HOME
            value: "/model-cache/huggingface"
          - name: NCCL_IB_DISABLE
            value: "1"
          - name: NCCL_SOCKET_IFNAME
            value: "eth0"
          - name: NCCL_P2P_DISABLE
            value: "1"
          - name: NCCL_DEBUG
            value: "WARN"
          - name: SGLANG_ENABLE_JIT_DEEPGEMM
            value: "0"
          - name: SGLANG_DISABLE_CUDNN_CHECK
            value: "1"
          - name: SGLANG_SET_CPU_AFFINITY
            value: "true"
          volumeMounts:
          - name: model-cache
            mountPath: /model-cache
          - name: shm
            mountPath: /dev/shm
          command: ["/bin/bash", "-c"]
          args:
          - |
            set -e
            CGPATH=$(awk -F: '$1=="0"{print $3}' /proc/1/cgroup 2>/dev/null)
            if [ -n "$CGPATH" ] && [ "$CGPATH" != "/" ]; then
              echo $((32*1024*1024*1024)) > "/sys/fs/cgroup${CGPATH}/memory.swap.max" 2>/dev/null \
                && echo "Container swap enabled (32GiB)" \
                || echo "WARNING: Could not set memory.swap.max"
            fi
            sync && echo 3 > /proc/sys/vm/drop_caches && echo 1 > /proc/sys/vm/compact_memory
            LEADER_IP=$(hostname -i | awk '{print $1}')
            echo "Leader IP: $LEADER_IP"
            echo "Starting SGLang PP=2 rank 0 (leader)..."
            python -m sglang.launch_server \
              --model Qwen/Qwen3-Coder-Next \
              --tp-size 2 \
              --tool-call-parser qwen3_coder \
              --trust-remote-code \
              --chunked-prefill-size 131072 \
              --mem-fraction-static 0.80 \
              --nnodes 2 \
              --node-rank 0 \
              --dist-init-addr ${LEADER_IP}:20000 \
              --host 0.0.0.0 \
              --port 8000 \
              --max-running-requests 4 \
              --context-length 131072 \
              --kv-cache-dtype fp8_e4m3 \
              --dist-timeout 7200 \
              --download-dir /model-cache/huggingface/hub
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 480   # up to ~121 min for model load
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 10
        volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-qwen3-coder-next-spark-01
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
    workerTemplate:
      metadata:
        labels:
          app: qwen3-coder-next
          role: worker
      spec:
        runtimeClassName: nvidia
        nodeSelector:
          kubernetes.io/hostname: spark-02
        tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        containers:
        - name: sglang
          image: lmsysorg/sglang:nightly-dev-cu13-20260318-cb1e63ab
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: "8"
              memory: 64Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "12"
              memory: 250Gi
              nvidia.com/gpu: "1"
          env:
          - name: HF_HOME
            value: "/model-cache/huggingface"
          - name: NCCL_IB_DISABLE
            value: "1"
          - name: NCCL_SOCKET_IFNAME
            value: "eth0"
          - name: NCCL_P2P_DISABLE
            value: "1"
          - name: NCCL_DEBUG
            value: "WARN"
          - name: SGLANG_ENABLE_JIT_DEEPGEMM
            value: "0"
          - name: SGLANG_DISABLE_CUDNN_CHECK
            value: "1"
          - name: SGLANG_SET_CPU_AFFINITY
            value: "true"
          volumeMounts:
          - name: model-cache
            mountPath: /model-cache
          - name: shm
            mountPath: /dev/shm
          command: ["/bin/bash", "-c"]
          args:
          - |
            set -e
            CGPATH=$(awk -F: '$1=="0"{print $3}' /proc/1/cgroup 2>/dev/null)
            if [ -n "$CGPATH" ] && [ "$CGPATH" != "/" ]; then
              echo $((32*1024*1024*1024)) > "/sys/fs/cgroup${CGPATH}/memory.swap.max" 2>/dev/null \
                && echo "Worker container swap enabled (32GiB)" \
                || echo "WARNING: Could not set memory.swap.max"
            fi
            sync && echo 3 > /proc/sys/vm/drop_caches && echo 1 > /proc/sys/vm/compact_memory
            echo "Starting SGLang PP=2 rank 1 (worker), connecting to ${LWS_LEADER_ADDRESS}:20000..."
            python -m sglang.launch_server \
              --model Qwen/Qwen3-Coder-Next \
              --tp-size 2 \
              --tool-call-parser qwen3_coder \
              --trust-remote-code \
              --chunked-prefill-size 131072 \
              --mem-fraction-static 0.80 \
              --nnodes 2 \
              --node-rank 1 \
              --dist-init-addr ${LWS_LEADER_ADDRESS}:20000 \
              --context-length 131072 \
              --kv-cache-dtype fp8_e4m3 \
              --dist-timeout 7200 \
              --download-dir /model-cache/huggingface/hub
        volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-qwen3-coder-next-spark-02
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi

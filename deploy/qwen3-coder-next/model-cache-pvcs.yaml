# PVC for Qwen/Qwen3-Coder-Next model cache — single shared RWX volume
#
# TP=2 across spark-01 and spark-02: both nodes read model weights from
# the same Longhorn RWX volume (served via NFS share-manager).
# 300 GB covers full checkpoint + HF hub metadata.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache-qwen3-coder-next-shared
  namespace: token-labs
spec:
  accessModes: [ReadWriteMany]
  storageClassName: longhorn-model-cache
  resources:
    requests:
      storage: 300Gi

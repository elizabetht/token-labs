# ServiceMonitors for token-labs inference backends
# Label release: kube-prometheus-stack required for discovery by the Prometheus instance.
# vLLM exposes /metrics natively.

---
# DeepSeek-R1-Distill-Qwen-32B vLLM ServiceMonitor (spark-01, helm release ms-deepseek-r1-32b)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: deepseek-r1-32b-vllm
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames: [token-labs]
  selector:
    matchLabels:
      llm-d.ai/model: deepseek-r1-32b
  endpoints:
  - port: http
    path: /metrics
    interval: 60s
    scrapeTimeout: 15s

---
# Nemotron-3-Nano-Omni-30B-A3B-Reasoning-NVFP4 vLLM ServiceMonitor (spark-02, helm release ms-nemotron-nano-nvfp4)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nemotron-nano-nvfp4-vllm
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames: [token-labs]
  selector:
    matchLabels:
      llm-d.ai/model: nemotron-nano-nvfp4
  endpoints:
  - port: http
    path: /metrics
    interval: 60s
    scrapeTimeout: 15s

# ServiceMonitors for token-labs inference backends
# Label release: kube-prometheus-stack required for discovery by the Prometheus instance.
# vLLM exposes /metrics natively.

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nemotron-120b-vllm
  namespace: token-labs
  labels:
    app: nemotron-120b-vllm
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: nemotron-120b-vllm
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
    scrapeTimeout: 10s

---
# Qwen3.5-27B vLLM ServiceMonitor
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: qwen35-27b-vllm
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames: [token-labs]
  selector:
    matchLabels:
      app: qwen35-27b-vllm
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
    scrapeTimeout: 10s

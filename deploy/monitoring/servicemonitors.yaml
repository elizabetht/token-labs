  namespace: token-labs
  labels:
    app: llama-31-8b-sglang
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: llama-31-8b-sglang
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
    scrapeTimeout: 10s


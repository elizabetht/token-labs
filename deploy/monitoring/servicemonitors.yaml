# ServiceMonitors for token-labs inference backends
# Label release: kube-prometheus-stack required for discovery by the Prometheus instance.
# vLLM exposes /metrics natively. SGLang requires --enable-metrics flag (added to pod spec).
# TRT-LLM /metrics returns []; availability tracked via kube_pod_status_ready only.

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: deepseek-r1-7b-vllm
  namespace: token-labs
  labels:
    app: deepseek-r1-7b-vllm
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: deepseek-r1-7b-vllm
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
    scrapeTimeout: 10s

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nemotron-120b-vllm
  namespace: token-labs
  labels:
    app: nemotron-120b-vllm
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: nemotron-120b-vllm
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
    scrapeTimeout: 10s

---
---
# TRT-LLM metrics at /prometheus/metrics (requires --return_perf_metrics flag and PROMETHEUS_MULTIPROC_DIR env).
# /metrics returns [] (iteration stats JSON, not Prometheus). Actual endpoint is /prometheus/metrics.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: qwen25-7b-trtllm-spark02
  namespace: token-labs
  labels:
    app: qwen25-7b-trtllm-spark02
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: qwen25-7b-trtllm-spark02
  endpoints:
  - port: http
    path: /prometheus/metrics
    interval: 15s
    scrapeTimeout: 10s

---
# SGLang metrics enabled via --enable-metrics flag in pod spec.
# Exposes sglang:* metrics at /metrics on port 8000.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:

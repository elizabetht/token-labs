apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-model-bench
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  token-labs-gpu.json: |
    {
      "uid": "token-labs-gpu",
      "title": "Token Labs — GPU Deep Dive",
      "tags": ["token-labs", "gpu", "dcgm"],
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "timezone": "browser",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "time": {"from": "now-1h", "to": "now"},
      "timepicker": {},
      "templating": {
        "list": [
          {
            "current": {},
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "definition": "label_values(DCGM_FI_DEV_GPU_UTIL, Hostname)",
            "hide": 0,
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "label": "Node",
            "name": "node",
            "options": [],
            "query": {
              "query": "label_values(DCGM_FI_DEV_GPU_UTIL, Hostname)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 2,
            "regex": "",
            "sort": 1,
            "type": "query"
          },
          {
            "current": {},
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "definition": "label_values(DCGM_FI_DEV_GPU_UTIL{Hostname=~\"$node\"}, gpu)",
            "hide": 0,
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "label": "GPU",
            "name": "gpu",
            "options": [],
            "query": {
              "query": "label_values(DCGM_FI_DEV_GPU_UTIL{Hostname=~\"$node\"}, gpu)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 2,
            "regex": "",
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "annotations": {"list": []},
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "GPU Compute",
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0}
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "GPU Utilization",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 1},
          "options": {
            "tooltip": {"mode": "multi", "sort": "none"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "spanNulls": false,
                "lineInterpolation": "linear"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 80},
                  {"color": "red", "value": 95}
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "DCGM_FI_DEV_GPU_UTIL{Hostname=~\"$node\", gpu=~\"$gpu\"}",
              "refId": "A",
              "legendFormat": "{{Hostname}} GPU{{gpu}}"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "SM Clock",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "description": "SM clock drops indicate thermal throttling",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 1},
          "options": {
            "tooltip": {"mode": "multi", "sort": "none"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "spanNulls": false,
                "lineInterpolation": "linear"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "DCGM_FI_DEV_SM_CLOCK{Hostname=~\"$node\", gpu=~\"$gpu\"}",
              "refId": "A",
              "legendFormat": "{{Hostname}} GPU{{gpu}}"
            }
          ]
        },
        {
          "id": 4,
          "type": "row",
          "title": "Power & Thermal",
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 9}
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Power Draw",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 10},
          "options": {
            "tooltip": {"mode": "multi", "sort": "none"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "watt",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "spanNulls": false,
                "lineInterpolation": "linear"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "DCGM_FI_DEV_POWER_USAGE{Hostname=~\"$node\", gpu=~\"$gpu\"}",
              "refId": "A",
              "legendFormat": "{{Hostname}} GPU{{gpu}}"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "GPU Temperature",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 10},
          "options": {
            "tooltip": {"mode": "multi", "sort": "none"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "spanNulls": false,
                "lineInterpolation": "linear"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 70},
                  {"color": "red", "value": 80}
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "DCGM_FI_DEV_GPU_TEMP{Hostname=~\"$node\", gpu=~\"$gpu\"}",
              "refId": "A",
              "legendFormat": "{{Hostname}} GPU{{gpu}}"
            }
          ]
        },
        {
          "id": 7,
          "type": "row",
          "title": "Memory",
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 18}
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Memory Bandwidth Utilization",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 19},
          "options": {
            "tooltip": {"mode": "multi", "sort": "none"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "spanNulls": false,
                "lineInterpolation": "linear"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 80},
                  {"color": "red", "value": 95}
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "DCGM_FI_DEV_MEM_COPY_UTIL{Hostname=~\"$node\", gpu=~\"$gpu\"}",
              "refId": "A",
              "legendFormat": "{{Hostname}} GPU{{gpu}}"
            }
          ]
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "GPU Memory Used",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 19},
          "options": {
            "tooltip": {"mode": "multi", "sort": "none"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "decmbytes",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "spanNulls": false,
                "lineInterpolation": "linear"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "DCGM_FI_DEV_FB_USED{Hostname=~\"$node\", gpu=~\"$gpu\"}",
              "refId": "A",
              "legendFormat": "used ({{Hostname}} GPU{{gpu}})"
            },
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "DCGM_FI_DEV_FB_FREE{Hostname=~\"$node\", gpu=~\"$gpu\"}",
              "refId": "B",
              "legendFormat": "free ({{Hostname}} GPU{{gpu}})"
            }
          ]
        },
        {
          "id": 10,
          "type": "row",
          "title": "Interconnect (NVLink)",
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 27}
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "NVLink TX Bandwidth",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 28},
          "options": {
            "tooltip": {"mode": "multi", "sort": "none"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "spanNulls": false,
                "lineInterpolation": "linear"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "DCGM_FI_DEV_NVLINK_BANDWIDTH_TOTAL{Hostname=~\"$node\", gpu=~\"$gpu\"}",
              "refId": "A",
              "legendFormat": "{{Hostname}} GPU{{gpu}} NVLink TX"
            }
          ]
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "PCIe TX Bandwidth",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 28},
          "options": {
            "tooltip": {"mode": "multi", "sort": "none"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "spanNulls": false,
                "lineInterpolation": "linear"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "DCGM_FI_DEV_PCIE_TX_THROUGHPUT{Hostname=~\"$node\", gpu=~\"$gpu\"}",
              "refId": "A",
              "legendFormat": "{{Hostname}} GPU{{gpu}}"
            }
          ]
        },
        {
          "id": 13,
          "type": "row",
          "title": "Correlation: GPU vs Inference",
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 36}
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "GPU Util vs vLLM KV Cache",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 37},
          "options": {
            "tooltip": {"mode": "multi", "sort": "none"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "spanNulls": false,
                "lineInterpolation": "linear"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}]
              }
            },
            "overrides": [
              {
                "matcher": {"id": "byFrameRefID", "options": "B"},
                "properties": [
                  {"id": "unit", "value": "percentunit"},
                  {
                    "id": "custom.axisPlacement",
                    "value": "right"
                  },
                  {
                    "id": "custom.axisLabel",
                    "value": "KV Cache %"
                  }
                ]
              },
              {
                "matcher": {"id": "byFrameRefID", "options": "A"},
                "properties": [
                  {"id": "unit", "value": "percent"},
                  {
                    "id": "custom.axisPlacement",
                    "value": "left"
                  },
                  {
                    "id": "custom.axisLabel",
                    "value": "GPU Util %"
                  }
                ]
              }
            ]
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "DCGM_FI_DEV_GPU_UTIL{Hostname=~\"$node\"}",
              "refId": "A",
              "legendFormat": "{{Hostname}} GPU util %"
            },
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "vllm:gpu_cache_usage_perc{namespace=\"token-labs\"}",
              "refId": "B",
              "legendFormat": "{{model_name}} KV cache %"
            }
          ]
        }
      ]
    }

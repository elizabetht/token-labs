apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-qwen35-27b-bench
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  qwen35-27b-bench.json: |
    {
      "uid": "qwen35-27b-bench",
      "title": "Qwen3.5-27B Benchmark Dashboard",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-6h", "to": "now" },
      "timezone": "browser",
      "tags": ["token-labs", "benchmark", "qwen"],
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "GPU Utilization",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "table", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "custom": { "lineWidth": 2 },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 80 },
                  { "color": "red", "value": 95 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_GPU_UTIL{Hostname=\"spark-01\"}",
              "legendFormat": "{{gpu}} GPU {{UUID}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "GPU Power Draw",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "table", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "watt",
              "custom": { "lineWidth": 2 }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_POWER_USAGE{Hostname=\"spark-01\"}",
              "legendFormat": "{{gpu}} GPU {{UUID}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "SM Clock (thermal throttle indicator)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "table", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "hertz",
              "displayName": "MHz",
              "custom": { "lineWidth": 2 }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_SM_CLOCK{Hostname=\"spark-01\"}",
              "legendFormat": "{{gpu}} GPU {{UUID}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "vLLM KV Cache Utilization",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "table", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "custom": { "lineWidth": 2 }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "vllm:gpu_cache_usage_perc{namespace=\"token-labs\"}",
              "legendFormat": "{{pod}}",
              "refId": "A"
            },
            {
              "expr": "vllm_gpu_cache_usage_perc{namespace=\"token-labs\"}",
              "legendFormat": "{{pod}}",
              "refId": "B"
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "TTFT p99",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "table", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "custom": { "lineWidth": 2 }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, rate(vllm:e2e_request_latency_seconds_bucket{namespace=\"token-labs\"}[5m])) * 1000",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "GPU Memory Bandwidth Utilization",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "table", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "custom": { "lineWidth": 2 }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_MEM_COPY_UTIL{Hostname=\"spark-01\"}",
              "legendFormat": "{{gpu}} GPU {{UUID}}",
              "refId": "A"
            }
          ]
        }
      ]
    }

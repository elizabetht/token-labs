apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-token-labs-slo
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  token-labs-slo.json: |
    {
      "uid": "token-labs-slo",
      "title": "Token Labs — SLO & Error Budget",
      "tags": ["token-labs", "slo"],
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "timezone": "browser",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "time": {"from": "now-6h", "to": "now"},
      "timepicker": {},
      "templating": {
        "list": [
          {
            "current": {},
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "definition": "label_values(vllm:num_requests_running{namespace=\"token-labs\"}, model_name)",
            "hide": 0,
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "label": "Model",
            "name": "model",
            "options": [],
            "query": {
              "query": "label_values(vllm:num_requests_running{namespace=\"token-labs\"}, model_name)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 2,
            "regex": "",
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "annotations": {"list": []},
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "SLO Status",
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0}
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Model Availability (1h)",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 6, "x": 0, "y": 1},
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "orientation": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 0.995},
                  {"color": "green", "value": 0.999}
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "max by (model_name) (token_labs:pod_available:rate1h)",
              "refId": "A",
              "legendFormat": "{{model_name}}"
            }
          ]
        },
        {
          "id": 3,
          "type": "gauge",
          "title": "Error Budget Remaining (30d)",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 6, "x": 6, "y": 1},
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "orientation": "auto",
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 0.25},
                  {"color": "green", "value": 0.5}
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "clamp_min(1 - (1 - avg(avg_over_time(token_labs:pod_available:bool[30d]))) / 0.005, 0)",
              "refId": "A",
              "legendFormat": "error budget remaining"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Current Error Rate",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 6, "x": 12, "y": 1},
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "orientation": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 0.01},
                  {"color": "red", "value": 0.05}
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "max(token_labs:error_rate:rate5m{model_name=~\"$model\"})",
              "refId": "A",
              "legendFormat": "error rate"
            }
          ]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Pod Ready Count",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 6, "x": 18, "y": 1},
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "orientation": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 1},
                  {"color": "green", "value": 2}
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(kube_pod_status_ready{namespace=\"token-labs\", condition=\"true\"} * on(pod) group_left() kube_pod_labels{namespace=\"token-labs\", label_llm_d_ai_inference_serving=\"true\"})",
              "refId": "A",
              "legendFormat": "ready pods"
            }
          ]
        },
        {
          "id": 6,
          "type": "row",
          "title": "Burn Rate & TTFT",
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 6}
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Availability Burn Rate (1h)",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 7},
          "options": {
            "tooltip": {"mode": "multi", "sort": "none"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "spanNulls": false,
                "lineInterpolation": "linear"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 0.072}
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "1 - max by (model_name) (token_labs:pod_available:rate1h)",
              "refId": "A",
              "legendFormat": "{{model_name}} burn rate"
            }
          ]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "TTFT p99 by Model",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 7},
          "options": {
            "tooltip": {"mode": "multi", "sort": "none"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "spanNulls": false,
                "lineInterpolation": "linear"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 1},
                  {"color": "red", "value": 3}
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "token_labs:ttft_p99:rate5m{model_name=~\"$model\"}",
              "refId": "A",
              "legendFormat": "{{model_name}}"
            }
          ]
        },
        {
          "id": 9,
          "type": "row",
          "title": "KV Cache & Error Rate",
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 15}
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "KV Cache Utilization",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
          "options": {
            "tooltip": {"mode": "multi", "sort": "none"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "spanNulls": false,
                "lineInterpolation": "linear"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 0.8},
                  {"color": "red", "value": 0.9}
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "token_labs:kv_cache_usage:current{model_name=~\"$model\"}",
              "refId": "A",
              "legendFormat": "{{model_name}}"
            }
          ]
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Error Rate",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
          "options": {
            "tooltip": {"mode": "multi", "sort": "none"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "spanNulls": false,
                "lineInterpolation": "linear"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 0.01},
                  {"color": "red", "value": 0.05}
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "token_labs:error_rate:rate5m{model_name=~\"$model\"}",
              "refId": "A",
              "legendFormat": "{{model_name}} error rate"
            }
          ]
        },
        {
          "id": 12,
          "type": "row",
          "title": "Active Alerts",
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 24}
        },
        {
          "id": 13,
          "type": "table",
          "title": "Firing Alerts",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 25},
          "options": {
            "cellHeight": "sm",
            "footer": {"countRows": false, "fields": "", "reducer": ["sum"], "show": false},
            "showHeader": true
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "cellOptions": {"type": "auto"},
                "inspect": false
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              },
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "1": {"text": "FIRING", "color": "red", "index": 0}
                  }
                }
              ]
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "Value"},
                "properties": [
                  {
                    "id": "custom.cellOptions",
                    "value": {"type": "color-background"}
                  }
                ]
              },
              {
                "matcher": {"id": "byName", "options": "__name__"},
                "properties": [{"id": "custom.hidden", "value": true}]
              }
            ]
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "ALERTS{alertstate=\"firing\"}",
              "refId": "A",
              "instant": true,
              "format": "table"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {"__name__": true, "Time": false},
                "renameByName": {
                  "alertname": "Alert",
                  "severity": "Severity",
                  "pod": "Pod",
                  "namespace": "Namespace"
                }
              }
            }
          ]
        }
      ]
    }

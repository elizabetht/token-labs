apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-token-labs-slo
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  token-labs-slo.json: |
    {
      "uid": "token-labs-slo",
      "title": "token-labs SLO Dashboard",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-3h", "to": "now" },
      "timezone": "browser",
      "tags": ["token-labs", "slo"],
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Model Availability (1h)",
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.995 },
                  { "color": "green", "value": 0.999 }
                ]
              },
              "mappings": []
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "token_labs:pod_available:rate1h",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "type": "gauge",
          "title": "Error Budget Remaining (30d)",
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.25 },
                  { "color": "green", "value": 0.5 }
                ]
              },
              "mappings": []
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "clamp_min(1 - (1 - avg_over_time(token_labs:pod_available:bool[30d])) / 0.005, 0)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Pod Status",
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "mappings": [
                { "type": "value", "options": { "0": { "text": "NOT READY", "color": "red" }, "1": { "text": "READY", "color": "green" } } }
              ]
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "kube_pod_status_ready{namespace=\"token-labs\", condition=\"true\"}",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Availability Burn Rate (1h)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "spanNulls": false
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 0.072 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "1 - token_labs:pod_available:rate1h",
              "legendFormat": "{{pod}} burn rate",
              "refId": "A"
            }
          ],
          "alert": null
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "p99 TTFT by Model",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "spanNulls": false
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "red", "value": 3.0 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "token_labs:ttft_p99:rate5m",
              "legendFormat": "{{model_name}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "KV Cache Utilization",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 14 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "spanNulls": false
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.8 },
                  { "color": "red", "value": 0.9 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "token_labs:kv_cache_usage:current",
              "legendFormat": "{{model}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "type": "table",
          "title": "Active Alerts",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 14 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "footer": { "show": false },
            "showHeader": true,
            "sortBy": [{ "displayName": "alertname", "desc": false }]
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "displayMode": "auto"
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Value" },
                "properties": [
                  { "id": "custom.displayMode", "value": "color-background" },
                  { "id": "thresholds", "value": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] } },
                  { "id": "mappings", "value": [{ "type": "value", "options": { "1": { "text": "FIRING", "color": "red" } } }] }
                ]
              }
            ]
          },
          "targets": [
            {
              "expr": "ALERTS{job=~\".*token-labs.*\", alertstate=\"firing\"}",
              "legendFormat": "{{alertname}} / {{pod}}",
              "refId": "A",
              "instant": true,
              "format": "table"
            }
          ],
          "transformations": [
            { "id": "organize", "options": { "excludeByName": { "__name__": true, "job": false }, "renameByName": { "alertname": "Alert", "pod": "Pod", "severity": "Severity", "Value": "State" } } }
          ]
        }
      ]
    }

# Copy this to secret.yaml, fill in your Slack webhook URL, then:
#   kubectl apply -f deploy/monitoring/incident-harness/secret.yaml
#
# DO NOT commit secret.yaml — it contains a real webhook URL.
# secret.yaml is gitignored below; this template is safe to commit.
apiVersion: v1
kind: Secret
metadata:
  name: incident-harness-secrets
  namespace: monitoring
type: Opaque
stringData:
  SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/REPLACE/ME/WITH_REAL_WEBHOOK"

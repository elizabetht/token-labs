# Bare Pod deployment — google/gemma-4-26B-A4B with vllm PP=2 + Ray
# Leader pod on spark-01. Gemma 4 26B is MoE (26B total, 4B active).
# gpu-memory-utilization 0.85 — MoE has sparser activation, more headroom vs dense.
#
# Leader discovery: headless Service (publishNotReadyAddresses=true) lets the
# worker resolve gemma4-26b-vllm-leader.<namespace>.svc.cluster.local
# before the leader passes its readiness probe.

---
apiVersion: v1
kind: Service
metadata:
  name: gemma4-26b-vllm-leader
  namespace: token-labs
  labels:
    app: gemma4-26b-vllm
spec:
  clusterIP: None
  publishNotReadyAddresses: true   # expose endpoint before pod is Ready
  selector:
    app: gemma4-26b-vllm
    role: leader
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  - name: ray-head
    port: 6379
    targetPort: 6379

---
apiVersion: v1
kind: Pod
metadata:
  name: gemma4-26b-vllm-leader
  namespace: token-labs
  labels:
    app: gemma4-26b-vllm
    role: leader
    llm-d.ai/inference-serving: "true"
    llm-d.ai/model: gemma4-26b-vllm
spec:
  restartPolicy: Never
  runtimeClassName: nvidia
  nodeSelector:
    kubernetes.io/hostname: spark-01
  tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule
  containers:
  - name: vllm
    image: ghcr.io/elizabetht/inference-images/vllm-serve:v1.0.0
    imagePullPolicy: IfNotPresent
    securityContext:
      privileged: true
    ports:
    - containerPort: 8000
      name: http
    - containerPort: 6379
      name: ray-head
    - containerPort: 8265
      name: ray-dashboard
    resources:
      requests:
        cpu: "8"
        memory: 64Gi
        nvidia.com/gpu: "1"
      limits:
        cpu: "12"
        memory: 250Gi
        nvidia.com/gpu: "1"
    env:
    - name: HF_HOME
      value: "/model-cache/huggingface"
    - name: FLASHINFER_DISABLE_VERSION_CHECK
      value: "1"
    - name: NCCL_IB_DISABLE
      value: "1"
    - name: NCCL_SOCKET_IFNAME
      value: "eth0"
    - name: NCCL_P2P_DISABLE
      value: "1"
    - name: NCCL_DEBUG
      value: "WARN"
    - name: RAY_memory_monitor_refresh_ms
      value: "0"        # disable Ray OOM killer — pod limits enforce memory bounds
    - name: RAY_CGRAPH_get_timeout
      value: "3600"     # 1h timeout for compiled DAG reads
    - name: VLLM_USE_RAY_COMPILED_DAG
      value: "0"        # disable compiled DAG: hangs on GB10 unified memory
    - name: HF_HUB_ETAG_TIMEOUT
      value: "60"
    - name: HF_HUB_DOWNLOAD_TIMEOUT
      value: "60"
    volumeMounts:
    - name: model-cache
      mountPath: /model-cache
    - name: shm
      mountPath: /dev/shm
    command: ["/bin/bash", "-c"]
    args:
    - |
      set -e
      LEADER_IP=$(hostname -i | awk '{print $1}')
      echo "Leader IP: $LEADER_IP"

      ray start --head \
        --port=6379 \
        --dashboard-host=0.0.0.0 \
        --block &

      echo "Waiting for Ray head to initialize..."
      until ray status 2>/dev/null | grep -q "Active:"; do
        sleep 2
      done
      echo "Ray head ready. Waiting for worker to join..."

      until [ "$(ray status 2>/dev/null | grep -c '1 node_')" -ge 2 ]; do
        sleep 3
      done
      echo "Worker joined Ray cluster. Starting vllm..."

      vllm serve google/gemma-4-26B-A4B \
        --gpu-memory-utilization 0.85 \
        --host 0.0.0.0 \
        --port 8000 \
        --dtype bfloat16 \
        --load-format auto \
        --attention-backend auto \
        --enable-prefix-caching \
        --max-model-len 131072 \
        --pipeline-parallel-size 2 \
        --distributed-executor-backend ray \
        --download-dir /model-cache/huggingface/hub \
        --enforce-eager \
        --trust-remote-code
    startupProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 120
      periodSeconds: 15
      failureThreshold: 480
      timeoutSeconds: 10
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      periodSeconds: 15
      failureThreshold: 3
      timeoutSeconds: 5
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      periodSeconds: 30
      failureThreshold: 5
      timeoutSeconds: 10
  volumes:
  - name: model-cache
    persistentVolumeClaim:
      claimName: model-cache-qwen3-coder-next-spark-01
  - name: shm
    emptyDir:
      medium: Memory
      sizeLimit: 16Gi

# Gateway resource — Envoy Gateway as the data-plane proxy
# Kuadrant policies and llm-d EPP both attach to this Gateway
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: token-labs-gateway
  namespace: token-labs
  annotations:
    metallb.io/loadBalancerIPs: "192.168.1.200"
spec:
  gatewayClassName: eg  # Envoy Gateway
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: token-labs-proxy-config
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    hostname: "api.tokenlabs.run"
    allowedRoutes:
      namespaces:
        from: Same

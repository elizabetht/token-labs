# EnvoyExtensionPolicy — override AI Gateway auto-generated extproc processingMode
#
# Problem: The AI Gateway controller auto-generates an EnvoyExtensionPolicy with
# response.body=Buffered. For streaming (SSE) responses, Envoy buffers the entire
# response body before returning it, which hits the default ~16s extproc timeout
# for any response that takes longer than 16s to generate (e.g. Qwen3.5-27B with
# reasoning/thinking tokens). This causes HTTP 500 "Internal Server Error" for
# requests with max_tokens > ~100-150 tokens.
#
# Fix: Set response.body=Streamed so Envoy streams SSE chunks directly to the
# client without buffering. The extproc filter still processes request bodies
# (Buffered) for token counting / model routing.
#
# Applied: kubectl patch envoyextensionpolicy ai-eg-eep-token-labs-gateway
#          -n token-labs --type=merge -p ...
# Note: This resource is auto-generated by the AI Gateway controller from the
# AIGatewayRoute. Re-apply this patch if the controller recreates the resource.
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: ai-eg-eep-token-labs-gateway
  namespace: token-labs
spec:
  extProc:
  - backendRefs:
    - group: gateway.envoyproxy.io
      kind: Backend
      name: envoy-ai-gateway-extproc-backend
      namespace: token-labs
    backendSettings:
      connection:
        bufferLimit: 50Mi
    metadata:
      writableNamespaces:
      - io.envoy.ai_gateway
    processingMode:
      allowModeOverride: true
      request:
        body: Buffered
      response:
        body: Streamed
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: token-labs-gateway

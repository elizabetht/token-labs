# AIGatewayRoute — multi-model inference routing via Envoy AI Gateway
#
# How it works:
#   1. Client sends POST /v1/chat/completions with JSON body {"model": "...", ...}
#   2. EAG's AI filter reads the "model" field and sets x-ai-eg-model header
#   3. AIGatewayRoute rules match on x-ai-eg-model → route to the correct InferencePool
#   4. The InferencePool's llm-d EPP picks the optimal vLLM pod (KV-cache aware)
#
# This replaces the old HTTPRoute + BBR (Body Based Router) pattern.
# No ConfigMaps, no ext_proc sidecar — EAG handles body parsing natively.
#
# InferencePool backendRefs:
#   llm-d-inferencepool-qwen35-397b  → spark-01+02  (Qwen3.5-397B-A17B-NVFP4 PP=2)
apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: AIGatewayRoute
metadata:
  name: llm-inference
  namespace: token-labs
spec:
  llmRequestCosts:
    - metadataKey: llm_input_token
      type: InputToken
    - metadataKey: llm_output_token
      type: OutputToken
    - metadataKey: llm_total_token
      type: TotalToken
    - metadataKey: llm_cached_input_token
      type: CachedInputToken
  parentRefs:
  - name: token-labs-gateway
    namespace: token-labs
    kind: Gateway
    group: gateway.networking.k8s.io
  rules:
  # ── Qwen3.5-397B-A17B-NVFP4 (PP=2 across spark-01 + spark-02) ──────────────
  - matches:
    - headers:
      - type: Exact
        name: x-ai-eg-model
        value: nvidia/Qwen3.5-397B-A17B-NVFP4
    backendRefs:
    - group: inference.networking.k8s.io
      kind: InferencePool
      name: llm-d-inferencepool-qwen35-397b
    timeouts:
      request: 600s     # longer timeout for 397B model inference

  # ── gpt-oss-120gb (PP=2 across spark-01 + spark-02) ─────────────────────
  # Replace "org/gpt-oss-120gb" with the actual HuggingFace model ID.
  - matches:
    - headers:
      - type: Exact
        name: x-ai-eg-model
        value: org/gpt-oss-120gb
    backendRefs:
    - group: inference.networking.k8s.io
      kind: InferencePool
      name: llm-d-inferencepool-gpt-oss
    timeouts:
      request: 600s     # longer timeout for 120B model inference

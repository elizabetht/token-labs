# AIGatewayRoute — multi-model inference routing via Envoy AI Gateway v0.2.0
#
# Flow: POST /v1/chat/completions → EAG reads "model" field → sets x-ai-eg-model header
#       → AIGatewayRoute matches header → routes to AIServiceBackend → EG Backend → Service
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: qwen35-27b-vllm-backend
  namespace: token-labs
spec:
  endpoints:
  - fqdn:
      hostname: qwen35-27b-vllm.token-labs.svc.cluster.local
      port: 8000
---
apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: AIServiceBackend
metadata:
  name: qwen35-27b-gptq
  namespace: token-labs
spec:
  schema:
    name: OpenAI
  backendRef:
    name: qwen35-27b-vllm-backend
    kind: Backend
    group: gateway.envoyproxy.io
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: nemotron-120b-vllm-backend
  namespace: token-labs
spec:
  endpoints:
  - fqdn:
      hostname: nemotron-120b-vllm.token-labs.svc.cluster.local
      port: 8000
---
apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: AIServiceBackend
metadata:
  name: nemotron-120b-nvfp4
  namespace: token-labs
spec:
  schema:
    name: OpenAI
  backendRef:
    name: nemotron-120b-vllm-backend
    kind: Backend
    group: gateway.envoyproxy.io
---
apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: AIGatewayRoute
metadata:
  name: llm-inference
  namespace: token-labs
spec:
  schema:
    name: OpenAI
  llmRequestCosts:
    - metadataKey: llm_input_token
      type: InputToken
    - metadataKey: llm_output_token
      type: OutputToken
    - metadataKey: llm_total_token
      type: TotalToken
  targetRefs:
  - name: token-labs-gateway
    kind: Gateway
    group: gateway.networking.k8s.io
  rules:
  - matches:
    - headers:
      - type: Exact
        name: x-ai-eg-model
        value: Qwen/Qwen3.5-27B-GPTQ-Int4
    backendRefs:
    - name: qwen35-27b-gptq

  - matches:
    - headers:
      - type: Exact
        name: x-ai-eg-model
        value: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
    backendRefs:
    - name: nemotron-120b-nvfp4

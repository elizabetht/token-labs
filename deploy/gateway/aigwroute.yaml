# AIGatewayRoute — multi-model inference routing via Envoy AI Gateway v0.2.0
#
# Flow: POST /v1/chat/completions → EAG reads "model" field → sets x-ai-eg-model header
#       → AIGatewayRoute matches header → routes to AIServiceBackend → EG Backend → Service
---
apiVersion: v1
kind: Service
metadata:
  name: deepseek-r1-32b-vllm
  namespace: token-labs
spec:
  selector:
    llm-d.ai/model: deepseek-r1-32b
    llm-d.ai/role: decode
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: deepseek-r1-32b-vllm-backend
  namespace: token-labs
spec:
  endpoints:
  - fqdn:
      hostname: deepseek-r1-32b-vllm.token-labs.svc.cluster.local
      port: 8000
---
apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: AIServiceBackend
metadata:
  name: deepseek-r1-32b
  namespace: token-labs
spec:
  schema:
    name: OpenAI
  backendRef:
    name: deepseek-r1-32b-vllm-backend
    kind: Backend
    group: gateway.envoyproxy.io
---
apiVersion: v1
kind: Service
metadata:
  name: nemotron-nano-nvfp4-vllm
  namespace: token-labs
spec:
  selector:
    llm-d.ai/model: nemotron-nano-nvfp4
    llm-d.ai/role: decode
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: nemotron-nano-nvfp4-vllm-backend
  namespace: token-labs
spec:
  endpoints:
  - fqdn:
      hostname: nemotron-nano-nvfp4-vllm.token-labs.svc.cluster.local
      port: 8000
---
apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: AIServiceBackend
metadata:
  name: nemotron-nano-nvfp4
  namespace: token-labs
spec:
  schema:
    name: OpenAI
  backendRef:
    name: nemotron-nano-nvfp4-vllm-backend
    kind: Backend
    group: gateway.envoyproxy.io
---
apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: AIGatewayRoute
metadata:
  name: llm-inference
  namespace: token-labs
spec:
  schema:
    name: OpenAI
  llmRequestCosts:
    - metadataKey: llm_input_token
      type: InputToken
    - metadataKey: llm_output_token
      type: OutputToken
    - metadataKey: llm_total_token
      type: TotalToken
  targetRefs:
  - name: token-labs-gateway
    kind: Gateway
    group: gateway.networking.k8s.io
  rules:
  - matches:
    - headers:
      - type: Exact
        name: x-ai-eg-model
        value: deepseek-ai/DeepSeek-R1-Distill-Qwen-32B
    backendRefs:
    - name: deepseek-r1-32b
  - matches:
    - headers:
      - type: Exact
        name: x-ai-eg-model
        value: nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-NVFP4
    backendRefs:
    - name: nemotron-nano-nvfp4

# HTTPRoute — multi-model routing for token-labs gateway
# Routes by x-ai-eg-model header (set by Envoy AI Gateway from request body "model" field).
# Models:
#   nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4 → nemotron-120b-vllm (spark-01)
#   deepseek-ai/DeepSeek-R1-Distill-Qwen-7B        → deepseek-r1-7b-vllm (spark-02)
#   meta-llama/Llama-3.1-8B-Instruct               → llama-31-8b-sglang  (spark-02)
#   Qwen/Qwen2.5-7B-Instruct (default)             → qwen25-7b-trtllm-spark01 (spark-01)

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nemotron-route
  namespace: token-labs
spec:
  parentRefs:
  - name: token-labs-gateway
    namespace: token-labs
    kind: Gateway
    group: gateway.networking.k8s.io
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /v1/
      headers:
      - name: x-ai-eg-model
        value: "nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4"
    backendRefs:
    - name: nemotron-120b-vllm
      port: 8000
      weight: 1
    timeouts:
      request: 600s

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: deepseek-r1-route
  namespace: token-labs
spec:
  parentRefs:
  - name: token-labs-gateway
    namespace: token-labs
    kind: Gateway
    group: gateway.networking.k8s.io
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /v1/
      headers:
      - name: x-ai-eg-model
        value: "deepseek-ai/DeepSeek-R1-Distill-Qwen-7B"
    backendRefs:
    - name: deepseek-r1-7b-vllm
      port: 8000
      weight: 1
    timeouts:
      request: 300s

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llama-31-8b-route
  namespace: token-labs
spec:
  parentRefs:
  - name: token-labs-gateway
    namespace: token-labs
    kind: Gateway
    group: gateway.networking.k8s.io
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /v1/
      headers:
      - name: x-ai-eg-model
        value: "meta-llama/Llama-3.1-8B-Instruct"
    backendRefs:
    - name: llama-31-8b-sglang
      port: 8000
      weight: 1
    timeouts:
      request: 300s

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: qwen25-7b-route
  namespace: token-labs
spec:
  parentRefs:
  - name: token-labs-gateway
    namespace: token-labs
    kind: Gateway
    group: gateway.networking.k8s.io
  rules:
  # Rewrite /models → /v1/models for playground compatibility
  - matches:
    - path:
        type: Exact
        value: /models
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /v1/models
    backendRefs:
    - name: qwen25-7b-trtllm-spark01
      port: 8000
      weight: 1
  # Default: Qwen2.5-7B-Instruct via TRT-LLM (spark-01)
  - matches:
    - path:
        type: PathPrefix
        value: /v1/
    backendRefs:
    - name: qwen25-7b-trtllm-spark01
      port: 8000
      weight: 1
    timeouts:
      request: 300s
  # Health / root catch-all
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: qwen25-7b-trtllm-spark01
      port: 8000
      weight: 1

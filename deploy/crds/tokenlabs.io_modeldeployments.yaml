---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: modeldeployments.tokenlabs.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.0
spec:
  group: tokenlabs.io
  names:
    kind: ModelDeployment
    listKind: ModelDeploymentList
    plural: modeldeployments
    shortNames:
    - md
    singular: modeldeployment
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.modelId
      name: Model
      type: string
    - jsonPath: .spec.replicas
      name: Replicas
      type: integer
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ModelDeployment is the schema for the modeldeployments API.
          It bundles a vLLM ModelService, an InferencePool, and an AIGatewayRoute rule
          into a single declarative unit so that onboarding a new model requires only
          one `kubectl apply`.
        properties:
          apiVersion:
            description: APIVersion defines the versioned schema of this representation of an object.
            type: string
          kind:
            description: Kind is a string value representing the REST resource this object represents.
            type: string
          metadata:
            type: object
          spec:
            description: ModelDeploymentSpec defines the desired state of a ModelDeployment.
            properties:
              modelId:
                description: ModelID is the Hugging Face model identifier (e.g. "nvidia/Qwen3-14B-NVFP4").
                minLength: 1
                type: string
              nodeSelector:
                additionalProperties:
                  type: string
                description: NodeSelector pins the vLLM pods to a specific node or set of nodes.
                type: object
              quantization:
                description: Quantization specifies the quantization format (e.g. "nvfp4", "fp8", "bfloat16").
                type: string
              replicas:
                default: 1
                description: Replicas is the desired number of vLLM decode worker pods.
                format: int32
                minimum: 0
                type: integer
              resources:
                description: Resources configures GPU memory allocation for the model.
                properties:
                  gpuMemoryFraction:
                    description: GPUMemoryFraction is the fraction of GPU memory to allocate (e.g. "0.9").
                    type: string
                type: object
              routing:
                description: Routing describes how requests are routed to this deployment via AIGatewayRoute.
                properties:
                  modelAliases:
                    description: ModelAliases lists the model name values that route to this deployment.
                    items:
                      type: string
                    minItems: 1
                    type: array
                required:
                - modelAliases
                type: object
            required:
            - modelId
            - replicas
            - routing
            type: object
          status:
            description: ModelDeploymentStatus defines the observed state of a ModelDeployment.
            properties:
              conditions:
                description: Conditions holds detailed status conditions following the standard Kubernetes conventions.
                items:
                  description: Condition contains details for one aspect of the current state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: lastTransitionTime is the last time the condition transitioned from one status to another.
                      format: date-time
                      type: string
                    message:
                      description: message is a human readable message indicating details about the transition.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: observedGeneration represents the .metadata.generation that the condition was set based upon.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: reason contains a programmatic identifier indicating the reason for the condition's last transition.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              inferencepoolRef:
                description: InferencepoolRef is the name of the InferencePool created for this deployment.
                type: string
              phase:
                description: 'Phase summarises the overall lifecycle state of the deployment. One of: Pending, Deploying, Running, Failed.'
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      scale:
        specReplicasPath: .spec.replicas
        statusReplicasPath: .status.replicas
      status: {}

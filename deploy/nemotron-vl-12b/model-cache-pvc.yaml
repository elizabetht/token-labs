# PVC for Nemotron VL 12B FP8 model cache on spark-02
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache-nemotron-vl-12b
  namespace: token-labs
  annotations:
    volume.kubernetes.io/selected-node: spark-02
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn-model-cache
  resources:
    requests:
      storage: 50Gi    # Nemotron VL 12B FP8 ~15 GB + HF hub temp files during download

apiVersion: v1
kind: ConfigMap
metadata:
  name: token-labs-inference-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  token-labs-inference.json: |
    {
      "uid": "token-labs-inference",
      "title": "Token Labs — Inference Operations",
      "tags": ["token-labs", "inference", "vllm", "envoy", "llm-d"],
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "timezone": "browser",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "time": {"from": "now-1h", "to": "now"},
      "timepicker": {},
      "templating": {
        "list": [
          {
            "current": {},
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "definition": "label_values(vllm:num_requests_running{namespace=\"token-labs\"}, model_name)",
            "hide": 0,
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "label": "Model",
            "name": "model",
            "options": [],
            "query": {
              "query": "label_values(vllm:num_requests_running{namespace=\"token-labs\"}, model_name)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 2,
            "regex": "",
            "sort": 1,
            "type": "query"
          },
          {
            "current": {},
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "definition": "label_values(DCGM_FI_DEV_GPU_UTIL, Hostname)",
            "hide": 0,
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "label": "Node",
            "name": "node",
            "options": [],
            "query": {
              "query": "label_values(DCGM_FI_DEV_GPU_UTIL, Hostname)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 2,
            "regex": "",
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "annotations": {"list": []},
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Status",
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0}
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Running Requests",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 1},
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "orientation": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 10},
                  {"color": "red", "value": 50}
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(vllm:num_requests_running{namespace=\"token-labs\", model_name=~\"$model\"})",
              "refId": "A",
              "legendFormat": "running"
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Waiting (Queue)",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 4, "x": 4, "y": 1},
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "orientation": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 1},
                  {"color": "red", "value": 5}
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(vllm:num_requests_waiting{namespace=\"token-labs\", model_name=~\"$model\"})",
              "refId": "A",
              "legendFormat": "waiting"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "KV Cache Max",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 4, "x": 8, "y": 1},
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "orientation": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 0.8},
                  {"color": "red", "value": 0.9}
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "max(vllm:gpu_cache_usage_perc{namespace=\"token-labs\", model_name=~\"$model\"})",
              "refId": "A",
              "legendFormat": "kv cache max"
            }
          ]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "TTFT p99",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 4, "x": 12, "y": 1},
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "orientation": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 1},
                  {"color": "red", "value": 3}
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "histogram_quantile(0.99, sum by (le) (rate(vllm:time_to_first_token_seconds_bucket{namespace=\"token-labs\", model_name=~\"$model\"}[5m])))",
              "refId": "A",
              "legendFormat": "TTFT p99"
            }
          ]
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Pod Ready",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 4, "x": 16, "y": 1},
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "orientation": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": {"text": "NOT READY", "color": "red", "index": 0}
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(kube_pod_status_ready{namespace=\"token-labs\", condition=\"true\"} * on(pod) group_left() kube_pod_labels{namespace=\"token-labs\", label_llm_d_ai_inference_serving=\"true\"})",
              "refId": "A",
              "legendFormat": "ready pods"
            }
          ]
        },
        {
          "id": 7,
          "type": "stat",
          "title": "Active Alerts",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 4, "x": 20, "y": 1},
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "orientation": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 1},
                  {"color": "red", "value": 3}
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "count(ALERTS{namespace=\"token-labs\", alertstate=\"firing\"}) OR vector(0)",
              "refId": "A",
              "legendFormat": "firing alerts"
            }
          ]
        },
        {
          "id": 8,
          "type": "row",
          "title": "Gateway",
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 5}
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Downstream RPS",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 6},
          "options": {
            "tooltip": {"mode": "multi", "sort": "none"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "spanNulls": false,
                "lineInterpolation": "linear"

              "refId": "B",
              "legendFormat": "{{model_name}} p95"
            },
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "histogram_quantile(0.99, sum by (le, model_name) (rate(vllm:inter_token_latency_seconds_bucket{namespace=\"token-labs\", model_name=~\"$model\"}[1m])))",
              "refId": "C",
              "legendFormat": "{{model_name}} p99"
            }
          ]

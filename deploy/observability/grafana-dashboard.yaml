            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum by (envoy_cluster_name) (rate(envoy_cluster_upstream_rq_total{envoy_cluster_name=~\".*token-labs.*|.*llm.*|.*qwen.*|.*nemotron.*\"}[1m]))",
              "refId": "A",
              "legendFormat": "{{envoy_cluster_name}}"
            },
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(rate(envoy_http_downstream_rq_total[1m]))",
              "refId": "B",
              "legendFormat": "total downstream"
            }
          ]
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Gateway Error Rate",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 6},
          "options": {
            "tooltip": {"mode": "multi", "sort": "none"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "spanNulls": false,
                "lineInterpolation": "linear"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 0.1}
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},

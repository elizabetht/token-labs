              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum by (model_name) (rate(vllm:prompt_tokens_total{namespace=\"token-labs\", model_name=~\"$model\"}[1m]))",
              "refId": "B",
              "legendFormat": "{{model_name}} prompt tok/s"
            }
          ]
        },
        {
          "id": 17,
          "type": "timeseries",
          "title": "Queue Depth by Model",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 31},

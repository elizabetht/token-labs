# Model Aggregator — merges /v1/models from all inference backends
# Runs on controller node (no GPU needed). Gateway /v1/models route points here.

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: model-aggregator-code
  namespace: token-labs
data:
  aggregator.py: |
    import asyncio
    import httpx
    from fastapi import FastAPI
    from fastapi.responses import JSONResponse

    app = FastAPI()

    BACKENDS = [
        ("qwen25-7b-trtllm-spark01",  "http://qwen25-7b-trtllm-spark01.token-labs.svc.cluster.local:8000"),
        ("deepseek-r1-7b-vllm",       "http://deepseek-r1-7b-vllm.token-labs.svc.cluster.local:8000"),
        ("llama-31-8b-sglang",        "http://llama-31-8b-sglang.token-labs.svc.cluster.local:8000"),
        ("nemotron-120b-vllm",        "http://nemotron-120b-vllm.token-labs.svc.cluster.local:8000"),
    ]

    async def fetch_models(client, name, base_url):
        try:
            r = await client.get(f"{base_url}/v1/models", timeout=3.0)
            if r.status_code == 200:
                return r.json().get("data", [])
        except Exception:
            pass
        return []

    @app.get("/v1/models")
    async def list_models():
        async with httpx.AsyncClient() as client:
            results = await asyncio.gather(*[
                fetch_models(client, name, url) for name, url in BACKENDS
            ])
        models = []
        seen = set()
        for backend_models in results:
            for m in backend_models:
                mid = m.get("id", "")
                if mid and mid not in seen:
                    seen.add(mid)
                    models.append(m)
        return JSONResponse({"object": "list", "data": models})

    @app.get("/health")
    async def health():
        return {"status": "ok"}

    @app.get("/models")
    async def models_compat():
        return await list_models()

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-aggregator
  namespace: token-labs
  labels:
    app: model-aggregator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-aggregator
  template:
    metadata:
      labels:
        app: model-aggregator
    spec:
      nodeSelector:
        kubernetes.io/hostname: controller
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      containers:
      - name: aggregator
        image: python:3.11-slim
        command: ["/bin/sh", "-c"]
        args:
        - |
          pip install fastapi uvicorn httpx --quiet
          uvicorn aggregator:app --host 0.0.0.0 --port 8000 --app-dir /app
        ports:
        - containerPort: 8000
          name: http
        resources:
          requests:
            cpu: "100m"
            memory: 128Mi
          limits:
            cpu: "500m"
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 30
        volumeMounts:
        - name: code
          mountPath: /app
      volumes:
      - name: code
        configMap:
          name: model-aggregator-code

---
apiVersion: v1
kind: Service
metadata:
  name: model-aggregator
  namespace: token-labs
  labels:
    app: model-aggregator
spec:
  type: ClusterIP
  selector:
    app: model-aggregator
  ports:
  - name: http
    port: 8000
    targetPort: 8000

# LeaderWorkerSet — nvidia/Qwen3.5-397B-A17B-NVFP4 with PP=2 across 2 DGX Sparks
#
# Architecture:
#   spark-01 (leader): SGLang HTTP server, PP rank 0, layers 0–N/2
#   spark-02 (worker): SGLang PP rank 1, layers N/2–N
#   Communication: NCCL over ethernet (pod overlay, backed by 100 GbE)
#   Distributed init: torch.distributed via --dist-init-addr leader_ip:20000
#
# Model: nvidia/Qwen3.5-397B-A17B-NVFP4
#   - 397B total params, 17B active (MoE), NVFP4 quantization (~200 GB weights)
#   - PP=2: each rank loads ~100 GB of layer weights (first/second half of layers)
#   - Pipeline parallelism: activations passed between stages; no all-reduce per layer
#   - vLLM PP=2 was attempted but profiling pass OOMs: vLLM allocates a test tensor
#     of gpu_memory_utilization × total_GPU_memory (0.85 × 125 GB = 106 GB) on top
#     of loaded weights (~110 GB rank 1), exceeding the 125 GB physical DRAM.
#     SGLang does not have this profiling preallocation step.
#
# Prerequisites:
#   1. Install LWS controller:
#      kubectl apply --server-side -f https://github.com/kubernetes-sigs/lws/releases/latest/download/manifests.yaml
#   2. Disable GPU time-slicing on both nodes:
#      kubectl label node spark-01 nvidia.com/gpu.sharing-strategy=none --overwrite
#      kubectl label node spark-02 nvidia.com/gpu.sharing-strategy=none --overwrite
#   3. Create PVCs:
#      kubectl apply -f deploy/qwen35-397b/model-cache-pvcs.yaml
#   4. Create HF token secret if model requires auth:
#      kubectl create secret generic hf-token-secret --from-literal=hf-token=hf_xxx -n token-labs

apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: qwen35-397b
  namespace: token-labs
  labels:
    app: qwen35-397b
spec:
  replicas: 1
  leaderWorkerTemplate:
    size: 2                                    # 1 leader + 1 worker
    restartPolicy: None
    leaderTemplate:
      metadata:
        labels:
          app: qwen35-397b
          role: leader
          llm-d.ai/inference-serving: "true"
          llm-d.ai/model: qwen35-397b
      spec:
        runtimeClassName: nvidia
        nodeSelector:
          kubernetes.io/hostname: spark-01
        tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        containers:
        - name: sglang
          image: lmsysorg/sglang:v0.5.9
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          ports:
          - containerPort: 8000
            name: http
          - containerPort: 20000
            name: dist-init
          resources:
            requests:
              cpu: "8"
              memory: 64Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "12"
              memory: 130Gi
              nvidia.com/gpu: "1"
          env:
          - name: HF_HOME
            value: "/model-cache/huggingface"
          - name: NCCL_IB_DISABLE
            value: "1"
          - name: NCCL_SOCKET_IFNAME
            value: "eth0"
          - name: NCCL_P2P_DISABLE
            value: "1"
          - name: NCCL_DEBUG
            value: "WARN"
          - name: SGLANG_ENABLE_JIT_DEEPGEMM
            value: "0"
          - name: SGLANG_DISABLE_CUDNN_CHECK
            value: "1"
          - name: SGLANG_SET_CPU_AFFINITY
            value: "true"
          - name: HF_HUB_OFFLINE
            value: "1"
          - name: TRANSFORMERS_OFFLINE
            value: "1"
          volumeMounts:
          - name: model-cache
            mountPath: /model-cache
          - name: shm
            mountPath: /dev/shm
          command: ["/bin/bash", "-c"]
          args:
          - |
            set -e
            # Enable swap: cgroup v2 sets memory.swap.max=0 by default
            CGPATH=$(awk -F: '$1=="0"{print $3}' /proc/1/cgroup 2>/dev/null)
            if [ -n "$CGPATH" ] && [ "$CGPATH" != "/" ]; then
              echo $((32*1024*1024*1024)) > "/sys/fs/cgroup${CGPATH}/memory.swap.max" 2>/dev/null \
                && echo "Container swap enabled (32GiB)" \
                || echo "WARNING: Could not set memory.swap.max"
            fi
            sync && echo 3 > /proc/sys/vm/drop_caches
            LEADER_IP=$(hostname -i | awk '{print $1}')
            echo "Leader IP: $LEADER_IP"
            echo "Starting SGLang PP=2 rank 0 (leader)..."
            python3 -m sglang.launch_server \
              --model nvidia/Qwen3.5-397B-A17B-NVFP4 \
              --quantization modelopt_fp4 \
              --pp-size 2 \
              --nnodes 2 \
              --node-rank 0 \
              --dist-init-addr ${LEADER_IP}:20000 \
              --host 0.0.0.0 \
              --port 8000 \
              --trust-remote-code \
              --download-dir /model-cache/huggingface/hub \
              --mem-fraction-static 0.80 \
              --max-running-requests 4 \
              --context-length 4096 \
              --attention-backend triton \
              --disable-cuda-graph
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 480   # up to ~121 min for model load
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 10
        volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-qwen35-397b-spark-01
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
    workerTemplate:
      metadata:
        labels:
          app: qwen35-397b
          role: worker
      spec:
        runtimeClassName: nvidia
        nodeSelector:
          kubernetes.io/hostname: spark-02
        tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        containers:
        - name: sglang
          image: lmsysorg/sglang:v0.5.9
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: "8"
              memory: 64Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "12"
              memory: 130Gi
              nvidia.com/gpu: "1"
          env:
          - name: HF_HOME
            value: "/model-cache/huggingface"
          - name: NCCL_IB_DISABLE
            value: "1"
          - name: NCCL_SOCKET_IFNAME
            value: "eth0"
          - name: NCCL_P2P_DISABLE
            value: "1"
          - name: NCCL_DEBUG
            value: "WARN"
          - name: SGLANG_ENABLE_JIT_DEEPGEMM
            value: "0"
          - name: SGLANG_DISABLE_CUDNN_CHECK
            value: "1"
          - name: SGLANG_SET_CPU_AFFINITY
            value: "true"
          - name: HF_HUB_OFFLINE
            value: "1"
          - name: TRANSFORMERS_OFFLINE
            value: "1"
          volumeMounts:
          - name: model-cache
            mountPath: /model-cache
          - name: shm
            mountPath: /dev/shm
          command: ["/bin/bash", "-c"]
          args:
          - |
            set -e
            # Enable swap: cgroup v2 sets memory.swap.max=0 by default
            CGPATH=$(awk -F: '$1=="0"{print $3}' /proc/1/cgroup 2>/dev/null)
            if [ -n "$CGPATH" ] && [ "$CGPATH" != "/" ]; then
              echo $((32*1024*1024*1024)) > "/sys/fs/cgroup${CGPATH}/memory.swap.max" 2>/dev/null \
                && echo "Worker container swap enabled (32GiB)" \
                || echo "WARNING: Could not set memory.swap.max"
            fi
            sync && echo 3 > /proc/sys/vm/drop_caches
            echo "Starting SGLang PP=2 rank 1 (worker), connecting to $LWS_LEADER_ADDRESS:20000..."
            python3 -m sglang.launch_server \
              --model nvidia/Qwen3.5-397B-A17B-NVFP4 \
              --quantization modelopt_fp4 \
              --pp-size 2 \
              --nnodes 2 \
              --node-rank 1 \
              --dist-init-addr ${LWS_LEADER_ADDRESS}:20000 \
              --trust-remote-code \
              --download-dir /model-cache/huggingface/hub \
              --mem-fraction-static 0.80 \
              --context-length 4096 \
              --attention-backend triton \
              --disable-cuda-graph
        volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-qwen35-397b-spark-02
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi

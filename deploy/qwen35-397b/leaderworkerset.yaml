# LeaderWorkerSet — nvidia/Qwen3.5-397B-A17B-NVFP4 with PP=2 across 2 DGX Sparks
#
# Architecture:
#   spark-01 (leader): Ray head + vLLM API server, pipeline layers 0–N/2
#   spark-02 (worker): Ray worker, pipeline layers N/2–N
#   Communication: NCCL over ethernet (pod overlay, backed by 100 GbE)
#
# Model: nvidia/Qwen3.5-397B-A17B-NVFP4
#   - 397B total params, 17B active (MoE), NVFP4 quantization (~200 GB weights)
#   - PP=2: rank 1 needs ~110 GB (layers + BF16 lm_head); requires 8 GB swap on
#     spark-02 so OS can page Ray (~7 GB anon) to NVMe, freeing DRAM for CUDA
#   - TP=2 rejected: modelopt NVFP4 lacks TP weight sharding; each rank loads
#     full model (~108 GB) instead of half, causing OOM
#
# Prerequisites:
#   1. Install LWS controller:
#      kubectl apply --server-side -f https://github.com/kubernetes-sigs/lws/releases/latest/download/manifests.yaml
#   2. Disable GPU time-slicing on both nodes:
#      kubectl label node spark-01 nvidia.com/gpu.sharing-strategy=none --overwrite
#      kubectl label node spark-02 nvidia.com/gpu.sharing-strategy=none --overwrite
#   3. Create PVCs:
#      kubectl apply -f deploy/qwen35-397b/model-cache-pvcs.yaml
#   4. Create HF token secret if model requires auth:
#      kubectl create secret generic hf-token-secret --from-literal=hf-token=hf_xxx -n token-labs

apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: qwen35-397b
  namespace: token-labs
  labels:
    app: qwen35-397b
spec:
  replicas: 1
  leaderWorkerTemplate:
    size: 2                                    # 1 leader + 1 worker
    restartPolicy: None
    leaderTemplate:
      metadata:
        labels:
          app: qwen35-397b
          role: leader
          llm-d.ai/inference-serving: "true"
          llm-d.ai/model: qwen35-397b
      spec:
        runtimeClassName: nvidia
        nodeSelector:
          kubernetes.io/hostname: spark-01
        tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        imagePullSecrets:
        - name: ghcr-pull-secret
        containers:
        - name: vllm
          image: ghcr.io/elizabetht/inference-images/vllm-serve:0.0.1
          imagePullPolicy: Always
          securityContext:
            privileged: true
          ports:
          - containerPort: 8000
            name: vllm
          - containerPort: 6379
            name: ray-head
          resources:
            requests:
              cpu: "8"
              memory: 64Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "12"
              memory: 130Gi
              nvidia.com/gpu: "1"
          env:
          - name: FLASHINFER_DISABLE_VERSION_CHECK
            value: "1"
          - name: HF_HOME
            value: "/model-cache/huggingface"
          - name: NCCL_IB_DISABLE
            value: "1"
          - name: NCCL_DEBUG
            value: "INFO"
          - name: NCCL_SOCKET_IFNAME
            value: "eth0"
          - name: NCCL_P2P_DISABLE
            value: "1"
          - name: RAY_memory_monitor_refresh_ms
            value: "0"
          - name: PYTORCH_ALLOC_CONF
            value: "expandable_segments:True"
          - name: RAY_CLUSTER_SIZE
            valueFrom:
              fieldRef:
                fieldPath: metadata.annotations['leaderworkerset.sigs.k8s.io/size']
          volumeMounts:
          - name: model-cache
            mountPath: /model-cache
          - name: shm
            mountPath: /dev/shm
          command: ["/bin/bash", "-c"]
          args:
          - |
            # Enable swap for this container: cgroup v2 sets memory.swap.max=0 by default,
            # preventing swap even when the host has swap space. Fix from privileged container.
            CGPATH=$(awk -F: '$1=="0"{print $3}' /proc/1/cgroup 2>/dev/null)
            if [ -n "$CGPATH" ] && [ "$CGPATH" != "/" ]; then
              echo $((32*1024*1024*1024)) > "/sys/fs/cgroup${CGPATH}/memory.swap.max" 2>/dev/null \
                && echo "Container swap enabled (32GiB)" \
                || echo "WARNING: Could not set memory.swap.max"
            fi
            sync && echo 3 > /proc/sys/vm/drop_caches
            # Pre-download model to PVC before starting Ray/vLLM to avoid
            # simultaneous download+load page cache pressure causing OOMKill.
            MODEL_MARKER="/model-cache/huggingface/hub/.model_ready"
            if [ ! -f "$MODEL_MARKER" ]; then
              echo "Pre-downloading model to leader PVC (this runs once)..."
              python3 -c "from huggingface_hub import snapshot_download; snapshot_download('nvidia/Qwen3.5-397B-A17B-NVFP4', cache_dir='/model-cache/huggingface/hub'); open('/model-cache/huggingface/hub/.model_ready','w').close(); print('Done')" \
                && sync && echo 3 > /proc/sys/vm/drop_caches && echo "Page cache cleared post-download"
            else
              echo "Model already cached, skipping download"
            fi
            /opt/venv/bin/ray start --head --port=6379 --num-gpus=1 --object-store-memory=524288000 --include-dashboard=false --block &
            until [ "$(/opt/venv/bin/ray status 2>/dev/null | awk '/GPU/{split($1,a,"/"); c=int(a[2])} END{print c+0}')" -ge "$RAY_CLUSTER_SIZE" ]; do
              echo "Waiting for $RAY_CLUSTER_SIZE GPUs (Ray workers)..."
              sleep 5
            done
            echo "All workers joined. Dropping page cache before vLLM..."
            sync && echo 3 > /proc/sys/vm/drop_caches
            echo "Starting vLLM with PP=2..."
            python -m vllm.entrypoints.openai.api_server \
              --model nvidia/Qwen3.5-397B-A17B-NVFP4 \
              --quantization modelopt \
              --dtype bfloat16 \
              --pipeline-parallel-size 2 \
              --distributed-executor-backend ray \
              --gpu-memory-utilization 0.90 \
              --enforce-eager \
              --trust-remote-code \
              --enable-auto-tool-choice \
              --tool-call-parser qwen3_coder \
              --host 0.0.0.0 \
              --port 8000 \
              --download-dir /model-cache/huggingface/hub \
              --num-gpu-blocks-override 64 \
              --max-model-len 4096
          startupProbe:
            httpGet:
              path: /v1/models
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 480   # 60s + 480x15s = up to ~121 min (large model download + load)
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /v1/models
              port: 8000
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /v1/models
              port: 8000
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 10
        volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-qwen35-397b-spark-01
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
    workerTemplate:
      metadata:
        labels:
          app: qwen35-397b
          role: worker
      spec:
        runtimeClassName: nvidia
        nodeSelector:
          kubernetes.io/hostname: spark-02
        tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        imagePullSecrets:
        - name: ghcr-pull-secret
        containers:
        - name: vllm
          image: ghcr.io/elizabetht/inference-images/vllm-serve:0.0.1
          imagePullPolicy: Always
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: "8"
              memory: 64Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "12"
              memory: 130Gi
              nvidia.com/gpu: "1"
          env:
          - name: FLASHINFER_DISABLE_VERSION_CHECK
            value: "1"
          - name: HF_HOME
            value: "/model-cache/huggingface"
          - name: NCCL_IB_DISABLE
            value: "1"
          - name: NCCL_DEBUG
            value: "INFO"
          - name: NCCL_SOCKET_IFNAME
            value: "eth0"
          - name: NCCL_P2P_DISABLE
            value: "1"
          - name: RAY_memory_monitor_refresh_ms
            value: "0"
          - name: PYTORCH_ALLOC_CONF
            value: "expandable_segments:True"
          volumeMounts:
          - name: model-cache
            mountPath: /model-cache
          - name: shm
            mountPath: /dev/shm
          command: ["/bin/bash", "-c"]
          args:
          - |
            # Enable swap for this container (same as leader — cgroup v2 sets swap.max=0)
            CGPATH=$(awk -F: '$1=="0"{print $3}' /proc/1/cgroup 2>/dev/null)
            if [ -n "$CGPATH" ] && [ "$CGPATH" != "/" ]; then
              echo $((32*1024*1024*1024)) > "/sys/fs/cgroup${CGPATH}/memory.swap.max" 2>/dev/null \
                && echo "Worker container swap enabled (32GiB)" \
                || echo "WARNING: Could not set memory.swap.max"
            fi
            sync && echo 3 > /proc/sys/vm/drop_caches
            # Pre-download model to worker PVC (rank 1 loads from this PVC)
            MODEL_MARKER="/model-cache/huggingface/hub/.model_ready"
            if [ ! -f "$MODEL_MARKER" ]; then
              echo "Pre-downloading model to worker PVC (this runs once)..."
              python3 -c "from huggingface_hub import snapshot_download; snapshot_download('nvidia/Qwen3.5-397B-A17B-NVFP4', cache_dir='/model-cache/huggingface/hub'); open('/model-cache/huggingface/hub/.model_ready','w').close(); print('Done')" \
                && sync && echo 3 > /proc/sys/vm/drop_caches && echo "Page cache cleared post-download"
            else
              echo "Model already cached, skipping download"
            fi
            python3 -m http.server 18889 --directory /opt/tiktoken-cache 2>/dev/null &
            echo "Connecting to Ray head at $LWS_LEADER_ADDRESS:6379..."
            until /opt/venv/bin/ray start --address=$LWS_LEADER_ADDRESS:6379 --num-gpus=1 --object-store-memory=524288000 --block; do
              echo "Ray head not ready, retrying in 10s..."
              sleep 10
            done
        volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-qwen35-397b-spark-02
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi

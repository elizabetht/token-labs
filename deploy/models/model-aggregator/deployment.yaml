# Model Aggregator — merges /v1/models from all inference backends
# Runs on controller node (no GPU needed). Gateway /v1/models route points here.
# Dynamically discovers backends via label: token-labs/model=true on Services.

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: model-aggregator
  namespace: token-labs

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: model-aggregator-service-reader
  namespace: token-labs
rules:
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: model-aggregator-service-reader
  namespace: token-labs
subjects:
- kind: ServiceAccount
  name: model-aggregator
  namespace: token-labs
roleRef:
  kind: Role
  name: model-aggregator-service-reader
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: model-aggregator-code
  namespace: token-labs
data:
  aggregator.py: |
    # loaded from deploy/models/model-aggregator/aggregator.py via kubectl patch

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-aggregator
  namespace: token-labs
  labels:
    app: model-aggregator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-aggregator
  template:
    metadata:
      labels:
        app: model-aggregator
    spec:
      serviceAccountName: model-aggregator
      nodeSelector:
        kubernetes.io/hostname: controller
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      containers:
      - name: aggregator
        image: python:3.11-slim
        command: ["/bin/sh", "-c"]
        args:
        - |
          pip install fastapi uvicorn httpx kubernetes --quiet
          uvicorn aggregator:app --host 0.0.0.0 --port 8000 --app-dir /app
        ports:
        - containerPort: 8000
          name: http
        resources:
          requests:
            cpu: "100m"
            memory: 128Mi
          limits:
            cpu: "500m"
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 30
        volumeMounts:
        - name: code
          mountPath: /app
      volumes:
      - name: code
        configMap:
          name: model-aggregator-code

---
apiVersion: v1
kind: Service
metadata:
  name: model-aggregator
  namespace: token-labs
  labels:
    app: model-aggregator
spec:
  type: ClusterIP
  selector:
    app: model-aggregator
  ports:
  - name: http
    port: 8000
    targetPort: 8000

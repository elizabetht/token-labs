# Bare Pod — Qwen/Qwen2.5-7B-Instruct with vLLM for RL demo on spark-02
# Lightweight: no nsys, no benchmarking overhead. For interactive learning only.

---
apiVersion: v1
kind: Pod
metadata:
  name: qwen25-7b-vllm-rl-demo-spark02
  namespace: token-labs
  labels:
    app: rl-demo
    role: inference
spec:
  restartPolicy: Never
  terminationGracePeriodSeconds: 60
  runtimeClassName: nvidia
  nodeSelector:
    kubernetes.io/hostname: spark-02
  tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule
  containers:
  - name: vllm
    image: vllm/vllm-openai:cu130-nightly
    imagePullPolicy: IfNotPresent
    securityContext:
      privileged: true
    ports:
    - containerPort: 8000
      name: http
    resources:
      requests:
        cpu: "4"
        memory: 16Gi
        nvidia.com/gpu: "1"
      limits:
        cpu: "8"
        memory: 64Gi
        nvidia.com/gpu: "1"
    env:
    - name: HF_HOME
      value: "/model-cache"
    - name: HF_HUB_CACHE
      value: "/model-cache/hub"
    - name: HF_HUB_OFFLINE
      value: "1"
    - name: HF_TOKEN
      valueFrom:
        secretKeyRef:
          name: llm-d-hf-token
          key: HF_TOKEN
          optional: true
    - name: HF_HUB_DISABLE_XET
      value: "1"
    - name: FLASHINFER_DISABLE_VERSION_CHECK
      value: "1"
    volumeMounts:
    - name: model-cache
      mountPath: /model-cache
    - name: shm
      mountPath: /dev/shm
    command: ["/bin/bash", "-c"]
    args:
    - |
      set -e
      python3 -c "import os; os.makedirs('/tmp/stubs/nixl_ep', exist_ok=True); open('/tmp/stubs/nixl_ep/__init__.py','w').write('import types,sys\nclass _S(types.ModuleType):\n def __getattr__(self,n): return type(n,(object,),{})\n_m=_S(__name__); _m.__file__=__file__; _m.__spec__=None\nsys.modules[__name__]=_m\n'); print('nixl_ep stub created')"
      export PYTHONPATH=/tmp/stubs:${PYTHONPATH:-}
      pip install pandas -q --no-deps 2>&1 | tail -1
      echo "Starting Qwen3.5-27B-GPTQ-Int4 (RL demo)"
      vllm serve Qwen/Qwen3.5-27B-GPTQ-Int4 \
        --port 8000 \
        --host 0.0.0.0 \
        --trust-remote-code \
        --max-model-len 16384 \
        --gpu-memory-utilization 0.60 \
        --enforce-eager \
        --max-num-seqs 32 \
        --quantization gptq_marlin \
        --language-model-only \
        --enable-prefix-caching
    startupProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 60
      periodSeconds: 15
      failureThreshold: 120
      timeoutSeconds: 10
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      periodSeconds: 10
      failureThreshold: 3
      timeoutSeconds: 5
  volumes:
  - name: model-cache
    persistentVolumeClaim:
      claimName: model-cache-qwen35-27b-spark-02
  - name: shm
    emptyDir:
      medium: Memory
      sizeLimit: 8Gi

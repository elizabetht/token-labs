# ModelService values — Qwen3.6-27B FP8, single-node decode-only
#
# No P/D disaggregation — single GB10 on spark-01 handles full prefill+decode.
# enforce-eager + num-gpu-blocks-override=2048 skips memory profiling pass
# to prevent ARM64 CPU saturation on startup (kubelet heartbeat starvation).

multinode: false

modelArtifacts:
  uri: "hf://Qwen/Qwen3.6-27B-FP8"
  size: 20Gi
  authSecretName: "llm-d-hf-token"
  name: "Qwen/Qwen3.6-27B-FP8"
  labels:
    llm-d.ai/inference-serving: "true"
    llm-d.ai/model: qwen36-27b
    llm-d.ai/hardware-variant: "gpu"
    llm-d.ai/accelerator-vendor: "nvidia"

routing:
  servicePort: 8000
  proxy:
    image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.7.1
    connector: nixlv2
    secure: false

decode:
  parallelism:
    tensor: 1
  create: true
  replicas: 1
  nodeSelector:
    kubernetes.io/hostname: spark-01
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values: ["spark-01"]
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  containers:
    - name: vllm
      # Custom image compiled with TORCH_CUDA_ARCH_LIST=12.1a for GB10 Blackwell (sm_121).
      # Eliminates vllm_c rms_norm Python fallback (84 dispatches/fwd pass → ~132s TTFT).
      # vLLM v0.19.0, CUDA 13.0.2, FlashInfer nightly cubin, sbsa/ARM64.
      image: "ghcr.io/elizabetht/token-labs/vllm-serve:v0.4.0"
      imagePullPolicy: IfNotPresent
      modelCommand: vllmServe
      startupProbe:
        httpGet:
          path: /v1/models
          port: 8000
        initialDelaySeconds: 60
        periodSeconds: 30
        failureThreshold: 180
        timeoutSeconds: 10
      readinessProbe:
        httpGet:
          path: /v1/models
          port: 8000
        initialDelaySeconds: 10
        periodSeconds: 15
        failureThreshold: 3
        timeoutSeconds: 10
      args:
        - --max-model-len
        - "16384"
        - --gpu-memory-utilization
        - "0.80"
        - --quantization
        - fp8
        - --enable-prefix-caching
        - --enable-chunked-prefill
        - --max-num-batched-tokens
        - "8192"
        - --enforce-eager
        - --trust-remote-code
        - --language-model-only
      env:
        - name: HF_HOME
          value: "/model-cache"
        - name: HF_HUB_CACHE
          value: "/model-cache/hub"
        - name: HF_HUB_OFFLINE
          value: "1"
        - name: FLASHINFER_DISABLE_VERSION_CHECK
          value: "1"
        - name: HF_HUB_DISABLE_XET
          value: "1"
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: VLLM_LOGGING_LEVEL
          value: "DEBUG"
      resources:
        requests:
          cpu: "5"
          memory: 32Gi
          nvidia.com/gpu: "1"
        limits:
          cpu: "10"
          memory: 120Gi
          nvidia.com/gpu: "1"
      volumeMounts:
        - name: model-cache
          mountPath: /model-cache
        - name: shm
          mountPath: /dev/shm
  volumes:
    - name: model-cache
      hostPath:
        path: /opt/models/qwen36-27b-cache
        type: Directory
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 16Gi

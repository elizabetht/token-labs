apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: qwen35-27b-route
  namespace: token-labs
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: token-labs-gateway
    namespace: token-labs
  rules:
  - backendRefs:
    - name: qwen35-27b-vllm
      port: 8000
      weight: 1
    matches:
    - headers:
      - name: x-ai-eg-model
        type: Exact
        value: Qwen/Qwen3.5-27B
      path:
        type: PathPrefix
        value: /v1/
    timeouts:
      request: 600s

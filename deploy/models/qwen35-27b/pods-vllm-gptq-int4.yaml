# Bare Pod — Qwen/Qwen3.5-27B-GPTQ-Int4 with vLLM, GPTQ-Int4 (gptq_marlin)
# Targets spark-01. Part of qwen35-27b framework/quant benchmark suite.

---
apiVersion: v1
kind: Pod
metadata:
  name: qwen35-27b-vllm-gptq-int4-leader
  namespace: token-labs
  labels:
    app: qwen35-27b-vllm
    role: leader
    quant: gptq-int4
spec:
  restartPolicy: Never
  terminationGracePeriodSeconds: 120
  runtimeClassName: nvidia
  nodeSelector:
    kubernetes.io/hostname: spark-01
  tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule
  containers:
  - name: vllm
    image: vllm/vllm-openai:cu130-nightly
    imagePullPolicy: Always
    securityContext:
      privileged: true
    ports:
    - containerPort: 8000
      name: http
    resources:
      requests:
        cpu: "8"
        memory: 32Gi
        nvidia.com/gpu: "1"
      limits:
        cpu: "12"
        memory: 120Gi
        nvidia.com/gpu: "1"
    env:
    - name: HF_HOME
      value: "/model-cache"
    - name: HF_HUB_CACHE
      value: "/model-cache/hub"
    - name: HF_TOKEN
      valueFrom:
        secretKeyRef:
          name: llm-d-hf-token
          key: HF_TOKEN
          optional: true
    - name: NCCL_IB_DISABLE
      value: "1"
    - name: NCCL_SOCKET_IFNAME
      value: "eth0"
    - name: NCCL_P2P_DISABLE
      value: "1"
    - name: NCCL_DEBUG
      value: "WARN"
    - name: FLASHINFER_DISABLE_VERSION_CHECK
      value: "1"
    - name: HF_HUB_DISABLE_XET
      value: "1"
    - name: VLLM_NVFP4_GEMM_BACKEND
      value: "marlin"
    - name: VLLM_USE_FLASHINFER_MOE_FP4
      value: "0"
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: "http://tempo.monitoring:4317"
    - name: OTEL_SERVICE_NAME
      value: "qwen35-27b-vllm-gptq-int4"
    - name: EXTRA_VLLM_ARGS
      value: ""
    volumeMounts:
    - name: model-cache
      mountPath: /model-cache
    - name: shm
      mountPath: /dev/shm
    command: ["/bin/bash", "-c"]
    args:
    - |
      set -e
      python3 -c "import os; os.makedirs('/tmp/stubs/nixl_ep', exist_ok=True); open('/tmp/stubs/nixl_ep/__init__.py','w').write('import types,sys\nclass _S(types.ModuleType):\n def __getattr__(self,n): return type(n,(object,),{})\n_m=_S(__name__); _m.__file__=__file__; _m.__spec__=None\nsys.modules[__name__]=_m\n'); print('nixl_ep stub created')"
      export PYTHONPATH=/tmp/stubs:${PYTHONPATH:-}
      pip install pandas -q --no-deps 2>&1 | tail -1
      # ── nsys profiling ───────────────────────────────────────────────────────
      mkdir -p /model-cache/profiles
      NSYS_OUT="/model-cache/profiles/$(hostname).nsys-rep"
      if ! command -v nsys >/dev/null 2>&1; then
        apt-get update -qq 2>/dev/null && \
        apt-get install -y --no-install-recommends nsight-systems-cli 2>/dev/null || true
      fi
      if command -v nsys >/dev/null 2>&1; then
        NSYS_PFX="nsys profile --trace=cuda,nvtx,cudnn,cublas --sample=none --force-overwrite=true --duration=600 --output=${NSYS_OUT}"
        echo "nsys enabled → ${NSYS_OUT}"
      else
        NSYS_PFX=""; echo "nsys not available, profiling disabled"
      fi
      # ─────────────────────────────────────────────────────────────────────────
      echo "Starting Qwen3.5-27B vLLM gptq-int4"
      ${NSYS_PFX} vllm serve Qwen/Qwen3.5-27B-GPTQ-Int4 \
        --port 8000 --host 0.0.0.0 \
        --tensor-parallel-size 1 \
        --trust-remote-code \
        --max-model-len 16384 \
        --gpu-memory-utilization 0.85 \
        --enable-prefix-caching \
        --enable-chunked-prefill \
        --max-num-batched-tokens 8192 \
        --otlp-traces-endpoint http://tempo.monitoring:4317 \
        --quantization gptq_marlin \
        --language-model-only \
        ${EXTRA_VLLM_ARGS:-}
    startupProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 120
      periodSeconds: 20
      failureThreshold: 360
      timeoutSeconds: 10
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      periodSeconds: 15
      failureThreshold: 3
      timeoutSeconds: 5
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      periodSeconds: 30
      failureThreshold: 5
      timeoutSeconds: 10
  volumes:
  - name: model-cache
    persistentVolumeClaim:
      claimName: model-cache-qwen35-27b-spark-01
  - name: shm
    emptyDir:
      medium: Memory
      sizeLimit: 16Gi

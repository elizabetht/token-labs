# ModelService values — nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-NVFP4
#
# NVFP4 quantized model (~15 GiB weights). Targets spark-02 GB10 (96 GiB HBM).
# --dtype auto lets vllm auto-detect NVFP4 on Blackwell.
# enforce-eager avoids memory profiling pass starvation on ARM64.
# HF_HUB_OFFLINE=0 for first boot so weights can be downloaded to PVC cache.

multinode: false

modelArtifacts:
  uri: "hf://nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-NVFP4"
  size: 30Gi
  authSecretName: "llm-d-hf-token"
  name: "nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-NVFP4"
  labels:
    llm-d.ai/inference-serving: "true"
    llm-d.ai/model: nemotron-nano-nvfp4
    llm-d.ai/hardware-variant: "gpu"
    llm-d.ai/accelerator-vendor: "nvidia"

routing:
  servicePort: 8000
  proxy:
    image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.7.1
    connector: nixlv2
    secure: false

decode:
  parallelism:
    tensor: 1
  create: true
  replicas: 1
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values: ["spark-02"]
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  containers:
    - name: vllm
      image: "vllm/vllm-openai@sha256:a97ffd8f5699075f6a963e2d43af11b5bc7083f8c66ffcea4bcad92b524a260d"
      imagePullPolicy: IfNotPresent
      modelCommand: vllmServe
      startupProbe:
        httpGet:
          path: /v1/models
          port: 8000
        initialDelaySeconds: 60
        periodSeconds: 30
        failureThreshold: 180
        timeoutSeconds: 10
      readinessProbe:
        httpGet:
          path: /v1/models
          port: 8000
        initialDelaySeconds: 10
        periodSeconds: 15
        failureThreshold: 3
        timeoutSeconds: 10
      args:
        - --max-model-len
        - "32768"
        - --gpu-memory-utilization
        - "0.85"
        - --dtype
        - "auto"
        - --enable-prefix-caching
        - --enable-chunked-prefill
        - --max-num-batched-tokens
        - "8192"
        - --enforce-eager
        - --trust-remote-code
      env:
        - name: HF_HOME
          value: "/model-cache"
        - name: HF_HUB_CACHE
          value: "/model-cache/hub"
        - name: HF_HUB_OFFLINE
          value: "0"
        - name: FLASHINFER_DISABLE_VERSION_CHECK
          value: "1"
        - name: HF_HUB_DISABLE_XET
          value: "1"
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: VLLM_LOGGING_LEVEL
          value: "DEBUG"
      resources:
        requests:
          cpu: "8"
          memory: 32Gi
          nvidia.com/gpu: "1"
        limits:
          cpu: "12"
          memory: 120Gi
          nvidia.com/gpu: "1"
      volumeMounts:
        - name: model-cache
          mountPath: /model-cache
        - name: shm
          mountPath: /dev/shm
  volumes:
    - name: model-cache
      persistentVolumeClaim:
        claimName: model-cache-nemotron-nano-nvfp4-spark-02
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 16Gi

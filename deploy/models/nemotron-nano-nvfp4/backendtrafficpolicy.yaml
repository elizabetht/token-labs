apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: nemotron-nano-nvfp4-timeout
  namespace: token-labs
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: nemotron-nano-nvfp4-route
  timeout:
    http:
      requestTimeout: 600s
      connectionIdleTimeout: 600s

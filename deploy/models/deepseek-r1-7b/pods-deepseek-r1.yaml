# Bare Pod deployment — deepseek-ai/DeepSeek-R1-Distill-Qwen-7B with vLLM
# Targets spark-02. Reasoning model (chain-of-thought), distinct from Llama/Nemotron/TRT-LLM.
# gpu-memory-utilization capped at 0.40 to share spark-02 with SGLang Llama.

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache-deepseek-r1-7b-spark-02
  namespace: token-labs
  annotations:
    volume.kubernetes.io/selected-node: spark-02
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: longhorn-model-cache
  resources:
    requests:
      storage: 30Gi

---
apiVersion: v1
kind: Service
metadata:
  name: deepseek-r1-7b-vllm
  namespace: token-labs
  labels:
    app: deepseek-r1-7b-vllm
    token-labs/model: "true"
spec:
  type: ClusterIP
  selector:
    app: deepseek-r1-7b-vllm
    role: leader
  ports:
  - name: http
    port: 8000
    targetPort: 8000

---
apiVersion: v1
kind: Pod
metadata:
  name: deepseek-r1-7b-vllm-leader
  namespace: token-labs
  labels:
    app: deepseek-r1-7b-vllm
    role: leader
spec:
  restartPolicy: Never
  runtimeClassName: nvidia
  nodeSelector:
    kubernetes.io/hostname: spark-02
  tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule
  containers:
  - name: vllm
    image: ghcr.io/elizabetht/inference-images/vllm-serve:0.19.0
    imagePullPolicy: IfNotPresent
    securityContext:
      privileged: true
    ports:
    - containerPort: 8000
      name: http
    resources:
      requests:
        cpu: "4"
        memory: 32Gi
        nvidia.com/gpu: "1"
      limits:
        cpu: "12"
        memory: 64Gi
        nvidia.com/gpu: "1"
    env:
    - name: HF_HOME
      value: "/model-cache"
    - name: HF_HUB_CACHE
      value: "/model-cache/hub"
    - name: NCCL_IB_DISABLE
      value: "1"
    - name: NCCL_SOCKET_IFNAME
      value: "eth0"
    - name: NCCL_P2P_DISABLE
      value: "1"
    - name: NCCL_DEBUG
      value: "WARN"
    - name: FLASHINFER_DISABLE_VERSION_CHECK
      value: "1"
    - name: HF_HUB_DISABLE_XET
      value: "1"
    - name: HF_HUB_OFFLINE
      value: "1"
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: "http://tempo.monitoring:4317"
    - name: OTEL_SERVICE_NAME
      value: "deepseek-r1-7b-vllm"
    volumeMounts:
    - name: model-cache
      mountPath: /model-cache
    - name: shm
      mountPath: /dev/shm
    command: ["/bin/bash", "-c"]
    args:
    - |
      set -e
      SNAP=$(cat "$HF_HUB_CACHE/models--deepseek-ai--DeepSeek-R1-Distill-Qwen-7B/refs/main")
      MODEL_PATH="$HF_HUB_CACHE/models--deepseek-ai--DeepSeek-R1-Distill-Qwen-7B/snapshots/$SNAP"
      echo "Starting DeepSeek-R1-Distill-Qwen-7B with standalone vLLM (path: $MODEL_PATH)"
      vllm serve "$MODEL_PATH" \
        --served-model-name deepseek-ai/DeepSeek-R1-Distill-Qwen-7B \
        --port 8000 \
        --host 0.0.0.0 \
        --tensor-parallel-size 1 \
        --trust-remote-code \
        --max-model-len 32768 \
        --gpu-memory-utilization 0.40 \
        --enable-prefix-caching \
        --enable-chunked-prefill \
        --max-num-batched-tokens 8192 \
        --speculative-config '{"method":"ngram","num_speculative_tokens":5,"prompt_lookup_max":4}' \
        --otlp-traces-endpoint http://tempo.monitoring:4317
    startupProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 60
      periodSeconds: 15
      failureThreshold: 120
      timeoutSeconds: 10
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      periodSeconds: 15
      failureThreshold: 3
      timeoutSeconds: 5
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      periodSeconds: 30
      failureThreshold: 5
      timeoutSeconds: 10
  volumes:
  - name: model-cache
    persistentVolumeClaim:
      claimName: model-cache-deepseek-r1-7b-spark-02
  - name: shm
    emptyDir:
      medium: Memory
      sizeLimit: 16Gi

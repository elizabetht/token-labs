# Bare Pod deployment — Qwen/Qwen2.5-7B-Instruct with TensorRT-LLM (PyTorch backend)
# Targets spark-02. Used by trtllm-baseline-qwen25-7b experiment (framework comparison).
# PyTorch backend: no engine compilation required, serves HF checkpoint directly.

---
apiVersion: v1
kind: Service
metadata:
  name: qwen25-7b-trtllm
  namespace: token-labs
  labels:
    app: qwen25-7b-trtllm
  annotations:
    metallb.io/loadBalancerIPs: 192.168.1.205
spec:
  type: LoadBalancer
  selector:
    app: qwen25-7b-trtllm
    role: leader
  ports:
  - name: http
    port: 8000
    targetPort: 8000

---
apiVersion: v1
kind: Pod
metadata:
  name: qwen25-7b-trtllm-leader
  namespace: token-labs
  labels:
    app: qwen25-7b-trtllm
    role: leader
spec:
  restartPolicy: Never
  runtimeClassName: nvidia
  nodeSelector:
    kubernetes.io/hostname: spark-02
  tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule
  containers:
  - name: trtllm
    image: nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc10
    imagePullPolicy: IfNotPresent
    securityContext:
      privileged: true
    ports:
    - containerPort: 8000
      name: http
    resources:
      requests:
        cpu: "8"
        memory: 32Gi
        nvidia.com/gpu: "1"
      limits:
        cpu: "12"
        memory: 64Gi
        nvidia.com/gpu: "1"
    env:
    - name: HF_HOME
      value: "/model-cache"
    - name: HF_HUB_CACHE
      value: "/model-cache/hub"
    - name: NCCL_IB_DISABLE
      value: "1"
    - name: NCCL_SOCKET_IFNAME
      value: "eth0"
    - name: NCCL_P2P_DISABLE
      value: "1"
    - name: NCCL_DEBUG
      value: "WARN"
    volumeMounts:
    - name: model-cache
      mountPath: /model-cache
    - name: shm
      mountPath: /dev/shm
    command: ["/bin/bash", "-c"]
    args:
    - |
      set -e
      echo "Starting TRT-LLM (pytorch backend), HF_HUB_CACHE=$HF_HUB_CACHE"
      trtllm-serve Qwen/Qwen2.5-7B-Instruct \
        --backend pytorch \
        --port 8000 \
        --host 0.0.0.0 \
        --tp_size 1 \
        --max_batch_size 256 \
        --trust_remote_code
    startupProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 60
      periodSeconds: 15
      failureThreshold: 120
      timeoutSeconds: 10
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      periodSeconds: 15
      failureThreshold: 3
      timeoutSeconds: 5
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      periodSeconds: 30
      failureThreshold: 5
      timeoutSeconds: 10
  volumes:
  - name: model-cache
    persistentVolumeClaim:
      claimName: model-cache-qwen25-7b-spark-02
  - name: shm
    emptyDir:
      medium: Memory
      sizeLimit: 16Gi

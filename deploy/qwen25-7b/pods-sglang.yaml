# Bare Pod deployment — Qwen/Qwen2.5-7B-Instruct with SGLang TP=1
# Targets spark-01. Used by sglang-baseline-qwen25-7b experiment (framework comparison).

---
apiVersion: v1
kind: Service
metadata:
  name: qwen25-7b-sglang
  namespace: token-labs
  labels:
    app: qwen25-7b-sglang
  annotations:
    metallb.io/loadBalancerIPs: 192.168.1.204
spec:
  type: LoadBalancer
  selector:
    app: qwen25-7b-sglang
    role: leader
  ports:
  - name: http
    port: 8000
    targetPort: 8000

---
apiVersion: v1
kind: Pod
metadata:
  name: qwen25-7b-sglang-leader
  namespace: token-labs
  labels:
    app: qwen25-7b-sglang
    role: leader
    llm-d.ai/inference-serving: "true"
    llm-d.ai/model: qwen25-7b-sglang
spec:
  restartPolicy: Never
  runtimeClassName: nvidia
  nodeSelector:
    kubernetes.io/hostname: spark-01
  tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule
  containers:
  - name: sglang
    image: lmsysorg/sglang:nightly-dev-cu13-20260318-cb1e63ab
    imagePullPolicy: IfNotPresent
    securityContext:
      privileged: true
    ports:
    - containerPort: 8000
      name: http
    resources:
      requests:
        cpu: "8"
        memory: 32Gi
        nvidia.com/gpu: "1"
      limits:
        cpu: "12"
        memory: 64Gi
        nvidia.com/gpu: "1"
    env:
    - name: HF_HOME
      value: "/model-cache/huggingface"
    - name: NCCL_IB_DISABLE
      value: "1"
    - name: NCCL_SOCKET_IFNAME
      value: "eth0"
    - name: NCCL_P2P_DISABLE
      value: "1"
    - name: NCCL_DEBUG
      value: "WARN"
    - name: SGLANG_ENABLE_JIT_DEEPGEMM
      value: "0"
    - name: SGLANG_DISABLE_CUDNN_CHECK
      value: "1"
    volumeMounts:
    - name: model-cache
      mountPath: /model-cache
    - name: shm
      mountPath: /dev/shm
    command: ["/bin/bash", "-c"]
    args:
    - |
      set -e
      python3 -m sglang.launch_server \
        --model-path Qwen/Qwen2.5-7B-Instruct \
        --port 8000 \
        --host 0.0.0.0 \
        --tp 1 \
        --trust-remote-code \
        --context-length 32768 \
        --mem-fraction-static 0.80
    startupProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 60
      periodSeconds: 15
      failureThreshold: 120
      timeoutSeconds: 10
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      periodSeconds: 15
      failureThreshold: 3
      timeoutSeconds: 5
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      periodSeconds: 30
      failureThreshold: 5
      timeoutSeconds: 10
  volumes:
  - name: model-cache
    persistentVolumeClaim:
      claimName: model-cache-qwen25-7b-spark-01
  - name: shm
    emptyDir:
      medium: Memory
      sizeLimit: 16Gi

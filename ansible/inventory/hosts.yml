---
# Inventory file for token-labs DGX Spark cluster
# controller: CPU-only control plane (192.168.1.75)
# spark-01, spark-02: GPU worker nodes (192.168.1.76, 192.168.1.77)

all:
  children:
    k8s_cluster:
      children:
        control_plane:
          hosts:
            controller:
              ansible_host: 192.168.1.75
              ansible_user: nvidia

        workers:
          hosts:
            spark-01:
              ansible_host: 192.168.1.76
              ansible_user: nvidia
            spark-02:
              ansible_host: 192.168.1.77
              ansible_user: nvidia

      vars:
        # Kubernetes version to install (matches prior microk8s version)
        k8s_version: "1.34"
        k8s_package_version: "1.34.5-1.1"

        # Container runtime
        containerd_version: "1.7.22"

        # Kubernetes cluster configuration
        k8s_pod_network_cidr: "10.244.0.0/16"
        k8s_service_cidr: "10.96.0.0/12"

        # CNI to install (flannel or cilium)
        k8s_cni: "flannel"

        # GPU configuration (workers only)
        nvidia_container_toolkit_version: "1.16.2"

        # Kubelet extra args
        kubelet_max_pods: 110
        kubelet_cgroup_driver: "systemd"

---
# Inventory file for DGX Spark nodes
# Update the IP addresses and hostnames to match your environment

all:
  children:
    k8s_cluster:
      children:
        control_plane:
          hosts:
            spark-01:
              ansible_host: 192.168.1.101
              ansible_user: ubuntu
              # Uncomment if using SSH key
              # ansible_ssh_private_key_file: ~/.ssh/id_rsa

        workers:
          hosts:
            spark-02:
              ansible_host: 192.168.1.102
              ansible_user: ubuntu
            spark-03:
              ansible_host: 192.168.1.103
              ansible_user: ubuntu

      vars:
        # Kubernetes version to install
        k8s_version: "1.31"
        k8s_package_version: "1.31.0-1.1"

        # Container runtime
        containerd_version: "1.7.22"

        # Kubernetes cluster configuration
        k8s_pod_network_cidr: "10.244.0.0/16"
        k8s_service_cidr: "10.96.0.0/12"

        # CNI to install (flannel or cilium)
        k8s_cni: "flannel"

        # GPU configuration
        nvidia_container_toolkit_version: "1.16.2"

        # Kubelet extra args
        kubelet_max_pods: 110
        kubelet_cgroup_driver: "systemd"

---
# Main playbook for DGX Spark cluster setup
# Usage: ansible-playbook -i inventory/hosts.yml site.yml

- name: Bootstrap all nodes
  hosts: k8s_cluster
  gather_facts: true
  roles:
    - bootstrap

- name: Configure NVIDIA runtime on GPU worker nodes
  hosts: workers
  gather_facts: false
  roles:
    - nvidia

- name: Initialize Kubernetes control plane
  hosts: control_plane
  gather_facts: false
  roles:
    - kubeadm-init

- name: Join worker nodes
  hosts: workers
  gather_facts: false
  serial: 1
  roles:
    - kubeadm-join

- name: Verify cluster setup
  hosts: control_plane
  gather_facts: false
  tasks:
    - name: Wait for all nodes to be ready
      shell: kubectl get nodes --no-headers | grep -c Ready
      register: ready_nodes
      until: ready_nodes.stdout | int == groups['k8s_cluster'] | length
      retries: 30
      delay: 10
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      become: true
      changed_when: false

    - name: Display cluster nodes
      shell: kubectl get nodes -o wide
      register: cluster_nodes
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      become: true
      changed_when: false

    - name: Show cluster nodes
      debug:
        var: cluster_nodes.stdout_lines
